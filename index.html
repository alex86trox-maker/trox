<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InkAR · Tatuajes Virtuales</title>
    <!-- Librerías A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Reset total */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: pan-y pinch-zoom;
        }

        /* La escena debe ocupar toda la pantalla */
        a-scene {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Asegurar que el canvas de A-Frame también ocupe todo */
        .a-canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Indicador de estado compacto */
        .marker-status {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #b967ff;
            color: #b967ff;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .marker-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            display: inline-block;
        }

        .marker-status .dot.active {
            background: #4caf50;
            box-shadow: 0 0 12px #4caf50;
        }

        /* Miniatura del marcador (opcional) */
        .marker-thumb {
            position: absolute;
            bottom: 100px;
            left: 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 6px;
            border: 1px solid #b967ff;
            z-index: 200;
        }

        .marker-thumb img {
            width: 50px;
            border-radius: 8px;
            display: block;
        }

        /* Panel inferior compacto */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Galería de iconos horizontal */
        .icon-gallery {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: #b967ff #2b2b44;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

        .icon-gallery button {
            background: #2b2b44;
            border: none;
            border-radius: 40px;
            padding: 8px 14px;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #151525;
            transition: all 0.1s;
            flex: 0 0 auto;
            border: 2px solid transparent;
            min-width: 48px;
        }

        .icon-gallery button.active {
            border-color: #b967ff;
            background: #4a3970;
            transform: scale(1.02);
        }

        .icon-gallery button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #151525;
        }

        /* Selector de color */
        .color-picker {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .color-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.1s;
        }

        .color-btn.black { background: #222; }
        .color-btn.red { background: #d32f2f; }
        .color-btn.blue { background: #1976d2; }
        .color-btn.gray { background: #757575; }
        .color-btn.active { border-color: white; transform: scale(1.15); }

        /* Control de tamaño */
        .size-control {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
        }

        .size-control i {
            font-size: 1rem;
            color: #b967ff;
        }

        #sizeSlider {
            width: 90px;
            height: 4px;
            background: #2b2b44;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #b967ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        /* Ajuste para pantallas muy pequeñas */
        @media (max-width: 360px) {
            .icon-gallery button { font-size: 1.2rem; padding: 6px 10px; min-width: 40px; }
            .color-btn { width: 28px; height: 28px; }
            #sizeSlider { width: 70px; }
            .marker-thumb { bottom: 90px; }
        }
    </style>
</head>
<body>
    <!-- Estado del marcador -->
    <div class="marker-status" id="markerStatus">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Buscando...</span>
    </div>

    <!-- Miniatura del marcador (para referencia) -->
    <div class="marker-thumb">
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" alt="Marcador">
    </div>

    <!-- Panel de controles compacto -->
    <div class="controls-panel">
        <div class="row">
            <div class="icon-gallery" id="iconGallery">
                <button class="tattoo-btn active" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
                <button class="tattoo-btn" data-icon="fa-moon"><i class="fas fa-moon"></i></button>
                <button class="tattoo-btn" data-icon="fa-feather"><i class="fas fa-feather"></i></button>
                <button class="tattoo-btn" data-icon="fa-infinity"><i class="fas fa-infinity"></i></button>
                <button class="tattoo-btn" data-icon="fa-tree"><i class="fas fa-tree"></i></button>
                <button class="tattoo-btn" data-icon="fa-anchor"><i class="fas fa-anchor"></i></button>
                <button class="tattoo-btn" data-icon="fa-star"><i class="fas fa-star"></i></button>
                <button class="tattoo-btn" data-icon="fa-dreamcatcher"><i class="fas fa-dreamcatcher"></i></button>
            </div>
        </div>
        <div class="row" style="justify-content: space-between;">
            <div class="color-picker">
                <button class="color-btn black active" data-color="black" title="Negro"></button>
                <button class="color-btn red" data-color="red" title="Rojo"></button>
                <button class="color-btn blue" data-color="blue" title="Azul"></button>
                <button class="color-btn gray" data-color="gray" title="Gris"></button>
            </div>
            <div class="size-control">
                <i class="fas fa-expand-alt"></i>
                <input type="range" id="sizeSlider" min="0.5" max="2.5" step="0.1" value="1.5">
            </div>
        </div>
    </div>

    <!-- Escena AR (debe estar al final para que el CSS la controle bien) -->
    <a-scene
        id="scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Target con el tatuaje (a-image) -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="tatuaje"
                     src=""
                     position="0 0.2 0"
                     rotation="-90 0 0"
                     width="1.2"
                     height="1.2"
                     material="transparent: true; depthTest: false; side: double;"
                     scale="1.5 1.5 1.5">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            const scene = document.getElementById('scene');
            const tatuaje = document.getElementById('tatuaje');
            const iconGallery = document.getElementById('iconGallery');
            const colorButtons = document.querySelectorAll('.color-btn');
            const sizeSlider = document.getElementById('sizeSlider');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            let currentIcon = 'fa-heart';
            let currentColor = '#222222';
            let currentScale = 1.5;

            const iconMap = {
                'fa-heart': '\u{f004}',
                'fa-moon': '\u{f186}',
                'fa-feather': '\u{f52d}',
                'fa-infinity': '\u{f534}',
                'fa-tree': '\u{f1bb}',
                'fa-anchor': '\u{f13d}',
                'fa-star': '\u{f005}',
                'fa-dreamcatcher': '\u{f77b}'
            };

            function generateTattooDataURL() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '400px "Font Awesome 6 Free"';
                ctx.fillStyle = currentColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(iconMap[currentIcon] || '\u{f004}', 256, 256);
                return canvas.toDataURL();
            }

            function updateTattoo() {
                const dataURL = generateTattooDataURL();
                tatuaje.setAttribute('src', dataURL);
                console.log('Tatuaje actualizado');
            }

            iconGallery.addEventListener('click', (e) => {
                const btn = e.target.closest('.tattoo-btn');
                if (!btn) return;
                const iconElem = btn.querySelector('i');
                let iconClass = '';
                for (let cls of iconElem.classList) {
                    if (cls.startsWith('fa-')) {
                        iconClass = cls;
                        break;
                    }
                }
                if (!iconClass) return;
                currentIcon = iconClass;
                document.querySelectorAll('.tattoo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateTattoo();
            });

            colorButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const colorKey = btn.dataset.color;
                    let colorHex = '#222222';
                    if (colorKey === 'red') colorHex = '#d32f2f';
                    else if (colorKey === 'blue') colorHex = '#1976d2';
                    else if (colorKey === 'gray') colorHex = '#757575';
                    currentColor = colorHex;
                    colorButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateTattoo();
                });
            });

            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            });

            const targetEntity = document.querySelector('[mindar-image-target]');
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', () => {
                    statusDot.classList.add('active');
                    statusText.innerText = 'Detectado';
                    updateTattoo();
                });
                targetEntity.addEventListener('targetLost', () => {
                    statusDot.classList.remove('active');
                    statusText.innerText = 'Buscando...';
                });
            }

            scene.addEventListener('loaded', () => {
                updateTattoo();
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            });

            setTimeout(() => {
                updateTattoo();
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            }, 1500);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InkAR+ · Tatuajes Virtuales</title>
    <!-- Librerías A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: pan-y pinch-zoom;
        }

        a-scene {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .a-canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Estado del marcador */
        .marker-status {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #b967ff;
            color: #b967ff;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .marker-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            display: inline-block;
        }

        .marker-status .dot.active {
            background: #4caf50;
            box-shadow: 0 0 12px #4caf50;
        }

        .marker-thumb {
            position: absolute;
            bottom: 120px;
            left: 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 6px;
            border: 1px solid #b967ff;
            z-index: 200;
        }

        .marker-thumb img {
            width: 50px;
            border-radius: 8px;
            display: block;
        }

        /* Panel de controles */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .icon-gallery {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: #b967ff #2b2b44;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

        .icon-gallery button {
            background: #2b2b44;
            border: none;
            border-radius: 40px;
            padding: 8px 14px;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #151525;
            transition: all 0.1s;
            flex: 0 0 auto;
            border: 2px solid transparent;
            min-width: 48px;
        }

        .icon-gallery button.active {
            border-color: #b967ff;
            background: #4a3970;
            transform: scale(1.02);
        }

        .color-picker {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .color-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-btn.black { background: #222; }
        .color-btn.red { background: #d32f2f; }
        .color-btn.blue { background: #1976d2; }
        .color-btn.gray { background: #757575; }
        .color-btn.active { border-color: white; transform: scale(1.15); }

        .size-control {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
        }

        .size-control i {
            font-size: 1rem;
            color: #b967ff;
        }

        #sizeSlider {
            width: 90px;
            height: 4px;
            background: #2b2b44;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #b967ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        /* Nuevos botones de rotación y captura */
        .action-buttons {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .action-btn {
            background: none;
            border: 1px solid #b967ff;
            color: #b967ff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #b967ff;
            color: black;
        }

        #rotationValue {
            min-width: 40px;
            text-align: center;
            color: white;
        }

        /* Tutorial overlay */
        .tutorial {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .tutorial.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .tutorial-content {
            background: #1e1e2f;
            border-radius: 30px;
            padding: 30px;
            max-width: 300px;
            text-align: center;
            border: 2px solid #b967ff;
        }

        .tutorial-content h2 {
            color: #b967ff;
            margin-bottom: 15px;
        }

        .tutorial-content p {
            margin: 10px 0;
        }

        .tutorial-content button {
            background: #b967ff;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Mensaje de error */
        .error-message {
            position: absolute;
            bottom: 200px;
            left: 20px;
            right: 20px;
            background: #d32f2f;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 360px) {
            .icon-gallery button { font-size: 1.2rem; padding: 6px 10px; min-width: 40px; }
            .color-btn { width: 28px; height: 28px; }
            #sizeSlider { width: 70px; }
            .marker-thumb { bottom: 100px; }
        }
    </style>
</head>
<body>
    <!-- Tutorial overlay -->
    <div class="tutorial" id="tutorial">
        <div class="tutorial-content">
            <h2><i class="fas fa-magic"></i> InkAR+</h2>
            <p>1️⃣ Apunta a la imagen marcadora (la de la miniatura abajo a la izquierda).</p>
            <p>2️⃣ Elige tu icono favorito y color.</p>
            <p>3️⃣ Ajusta tamaño y rotación con los botones.</p>
            <p>4️⃣ Captura y comparte tu tatuaje virtual.</p>
            <button id="closeTutorial"><i class="fas fa-check"></i> ¡Entendido!</button>
        </div>
    </div>

    <!-- Mensaje de error de cámara -->
    <div class="error-message" id="cameraError">
        <i class="fas fa-exclamation-triangle"></i> No se pudo acceder a la cámara. Verifica permisos.
    </div>

    <!-- Estado del marcador -->
    <div class="marker-status" id="markerStatus">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Buscando...</span>
    </div>

    <!-- Miniatura del marcador -->
    <div class="marker-thumb">
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" alt="Marcador">
    </div>

    <!-- Panel de controles mejorado -->
    <div class="controls-panel">
        <div class="row">
            <div class="icon-gallery" id="iconGallery">
                <button class="tattoo-btn" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
                <button class="tattoo-btn" data-icon="fa-moon"><i class="fas fa-moon"></i></button>
                <button class="tattoo-btn" data-icon="fa-feather"><i class="fas fa-feather"></i></button>
                <button class="tattoo-btn" data-icon="fa-infinity"><i class="fas fa-infinity"></i></button>
                <button class="tattoo-btn" data-icon="fa-tree"><i class="fas fa-tree"></i></button>
                <button class="tattoo-btn" data-icon="fa-anchor"><i class="fas fa-anchor"></i></button>
                <button class="tattoo-btn" data-icon="fa-star"><i class="fas fa-star"></i></button>
                <button class="tattoo-btn" data-icon="fa-dreamcatcher"><i class="fas fa-dreamcatcher"></i></button>
            </div>
        </div>

        <div class="row" style="justify-content: space-between;">
            <div class="color-picker">
                <button class="color-btn black" data-color="black" title="Negro"></button>
                <button class="color-btn red" data-color="red" title="Rojo"></button>
                <button class="color-btn blue" data-color="blue" title="Azul"></button>
                <button class="color-btn gray" data-color="gray" title="Gris"></button>
            </div>
            <div class="size-control">
                <i class="fas fa-expand-alt"></i>
                <input type="range" id="sizeSlider" min="0.5" max="2.5" step="0.1" value="1.5">
            </div>
        </div>

        <!-- Nuevas funciones: rotación y captura -->
        <div class="row" style="justify-content: space-between;">
            <div class="action-buttons">
                <button class="action-btn" id="rotateLeft" title="Rotar izquierda"><i class="fas fa-undo-alt"></i></button>
                <span id="rotationValue">0°</span>
                <button class="action-btn" id="rotateRight" title="Rotar derecha"><i class="fas fa-redo-alt"></i></button>
                <button class="action-btn" id="resetRotation" title="Reiniciar rotación"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="captureBtn" title="Capturar pantalla"><i class="fas fa-camera"></i></button>
            </div>
        </div>
    </div>

    <!-- Escena AR -->
    <a-scene
        id="scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="tatuaje"
                     src=""
                     position="0 0.2 0"
                     rotation="-90 0 0"
                     width="1.2"
                     height="1.2"
                     material="transparent: true; depthTest: false; side: double;"
                     scale="1.5 1.5 1.5">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            // Elementos del DOM
            const scene = document.getElementById('scene');
            const tatuaje = document.getElementById('tatuaje');
            const iconGallery = document.getElementById('iconGallery');
            const colorButtons = document.querySelectorAll('.color-btn');
            const sizeSlider = document.getElementById('sizeSlider');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const tutorial = document.getElementById('tutorial');
            const closeTutorialBtn = document.getElementById('closeTutorial');
            const rotateLeftBtn = document.getElementById('rotateLeft');
            const rotateRightBtn = document.getElementById('rotateRight');
            const resetRotationBtn = document.getElementById('resetRotation');
            const rotationSpan = document.getElementById('rotationValue');
            const captureBtn = document.getElementById('captureBtn');
            const cameraErrorDiv = document.getElementById('cameraError');

            // Estado de la app
            let currentIcon = 'fa-heart';
            let currentColor = '#222222';
            let currentScale = 1.5;
            let currentRotationY = 0; // grados

            // Mapa de iconos a códigos Unicode (versión sólida de Font Awesome)
            const iconMap = {
                'fa-heart': '\u{f004}',
                'fa-moon': '\u{f186}',
                'fa-feather': '\u{f52d}',
                'fa-infinity': '\u{f534}',
                'fa-tree': '\u{f1bb}',
                'fa-anchor': '\u{f13d}',
                'fa-star': '\u{f005}',
                'fa-dreamcatcher': '\u{f77b}'
            };

            // ========== PERSISTENCIA LOCAL ==========
            function loadPreferences() {
                try {
                    const saved = JSON.parse(localStorage.getItem('inkar_preferences'));
                    if (saved) {
                        currentIcon = saved.icon || 'fa-heart';
                        currentColor = saved.color || '#222222';
                        currentScale = saved.scale || 1.5;
                        currentRotationY = saved.rotation || 0;

                        // Aplicar icono activo
                        document.querySelectorAll('.tattoo-btn').forEach(btn => {
                            const iconElem = btn.querySelector('i');
                            let iconClass = '';
                            for (let cls of iconElem.classList) {
                                if (cls.startsWith('fa-')) {
                                    iconClass = cls;
                                    break;
                                }
                            }
                            if (iconClass === currentIcon) {
                                btn.classList.add('active');
                            } else {
                                btn.classList.remove('active');
                            }
                        });

                        // Aplicar color activo
                        colorButtons.forEach(btn => {
                            const colorKey = btn.dataset.color;
                            let colorHex = '#222222';
                            if (colorKey === 'red') colorHex = '#d32f2f';
                            else if (colorKey === 'blue') colorHex = '#1976d2';
                            else if (colorKey === 'gray') colorHex = '#757575';
                            if (colorHex === currentColor) {
                                btn.classList.add('active');
                            } else {
                                btn.classList.remove('active');
                            }
                        });

                        // Aplicar escala
                        sizeSlider.value = currentScale;

                        // Aplicar rotación
                        updateRotationDisplay();
                    } else {
                        // Valores por defecto: activar corazón y negro
                        document.querySelector('.tattoo-btn[data-icon="fa-heart"]').classList.add('active');
                        document.querySelector('.color-btn.black').classList.add('active');
                    }
                } catch (e) {
                    console.warn('Error cargando preferencias', e);
                }
            }

            function savePreferences() {
                const prefs = {
                    icon: currentIcon,
                    color: currentColor,
                    scale: currentScale,
                    rotation: currentRotationY
                };
                localStorage.setItem('inkar_preferences', JSON.stringify(prefs));
            }

            // ========== GENERAR TATUAJE (CANVAS) ==========
            function generateTattooDataURL() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '400px "Font Awesome 6 Free"';
                ctx.fillStyle = currentColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(iconMap[currentIcon] || '\u{f004}', 256, 256);
                return canvas.toDataURL();
            }

            function updateTattoo() {
                const dataURL = generateTattooDataURL();
                tatuaje.setAttribute('src', dataURL);
                // Aplicar escala y rotación (se mantienen)
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                tatuaje.setAttribute('rotation', `-90 ${currentRotationY} 0`);
                console.log('Tatuaje actualizado');
                savePreferences(); // Guardar cambios
            }

            // ========== ROTACIÓN ==========
            function updateRotationDisplay() {
                rotationSpan.innerText = currentRotationY + '°';
                tatuaje.setAttribute('rotation', `-90 ${currentRotationY} 0`);
                savePreferences();
            }

            rotateLeftBtn.addEventListener('click', () => {
                currentRotationY = (currentRotationY - 15) % 360;
                updateRotationDisplay();
            });

            rotateRightBtn.addEventListener('click', () => {
                currentRotationY = (currentRotationY + 15) % 360;
                updateRotationDisplay();
            });

            resetRotationBtn.addEventListener('click', () => {
                currentRotationY = 0;
                updateRotationDisplay();
            });

            // ========== CAPTURA DE PANTALLA ==========
            captureBtn.addEventListener('click', () => {
                // Capturar el canvas de A-Frame
                const canvas = document.querySelector('a-scene').canvas;
                if (canvas) {
                    // Crear un enlace de descarga
                    const link = document.createElement('a');
                    link.download = 'inkar-tatuaje.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } else {
                    alert('No se pudo capturar la imagen');
                }
            });

            // ========== EVENTOS DE INTERFAZ ==========
            iconGallery.addEventListener('click', (e) => {
                const btn = e.target.closest('.tattoo-btn');
                if (!btn) return;
                const iconElem = btn.querySelector('i');
                let iconClass = '';
                for (let cls of iconElem.classList) {
                    if (cls.startsWith('fa-')) {
                        iconClass = cls;
                        break;
                    }
                }
                if (!iconClass) return;
                currentIcon = iconClass;
                document.querySelectorAll('.tattoo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateTattoo();
            });

            colorButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const colorKey = btn.dataset.color;
                    let colorHex = '#222222';
                    if (colorKey === 'red') colorHex = '#d32f2f';
                    else if (colorKey === 'blue') colorHex = '#1976d2';
                    else if (colorKey === 'gray') colorHex = '#757575';
                    currentColor = colorHex;
                    colorButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateTattoo();
                });
            });

            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                savePreferences();
            });

            // ========== MANEJO DEL MARCADOR ==========
            const targetEntity = document.querySelector('[mindar-image-target]');
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', () => {
                    statusDot.classList.add('active');
                    statusText.innerText = 'Detectado';
                    // Al detectar, actualizar el tatuaje (por si acaso)
                    updateTattoo();
                });
                targetEntity.addEventListener('targetLost', () => {
                    statusDot.classList.remove('active');
                    statusText.innerText = 'Buscando...';
                });
            }

            // ========== TUTORIAL ==========
            function hideTutorial() {
                tutorial.classList.add('hidden');
            }
            closeTutorialBtn.addEventListener('click', hideTutorial);
            // También ocultar al encontrar un marcador
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', hideTutorial);
            }

            // ========== ERROR DE CÁMARA ==========
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(() => {})
                .catch((err) => {
                    console.error('Error cámara:', err);
                    cameraErrorDiv.style.display = 'block';
                    setTimeout(() => { cameraErrorDiv.style.display = 'none'; }, 5000);
                });

            // ========== INICIALIZACIÓN ==========
            scene.addEventListener('loaded', () => {
                loadPreferences(); // Cargar preferencias antes de actualizar
                updateTattoo(); // Esto también guarda las preferencias al inicio
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                tatuaje.setAttribute('rotation', `-90 ${currentRotationY} 0`);
            });

            // Respaldo por si loaded no se dispara
            setTimeout(() => {
                if (!tatuaje.getAttribute('src')) {
                    loadPreferences();
                    updateTattoo();
                    tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                    tatuaje.setAttribute('rotation', `-90 ${currentRotationY} 0`);
                }
            }, 1500);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InkAR · Tatuajes con imagen propia</title>
    <!-- Librerías A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: pan-y pinch-zoom;
        }

        a-scene {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .a-canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .marker-status {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #b967ff;
            color: #b967ff;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .marker-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            display: inline-block;
        }

        .marker-status .dot.active {
            background: #4caf50;
            box-shadow: 0 0 12px #4caf50;
        }

        .marker-thumb {
            position: absolute;
            bottom: 120px;
            left: 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 6px;
            border: 1px solid #b967ff;
            z-index: 200;
        }

        .marker-thumb img {
            width: 50px;
            border-radius: 8px;
            display: block;
        }

        /* Botón para plegar/desplegar panel */
        .toggle-panel-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #b967ff;
            color: #b967ff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 300;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .toggle-panel-btn:hover {
            background: #b967ff;
            color: black;
        }

        /* Panel de controles */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 70vh;
            overflow-y: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .controls-panel.hidden {
            transform: translateY(calc(100% + 30px));
            opacity: 0;
            pointer-events: none;
        }

        .toggle-panel-btn i::before {
            content: "\f078"; /* fa-chevron-down */
        }

        .toggle-panel-btn.hidden i::before {
            content: "\f077"; /* fa-chevron-up */
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Botón de subir imágenes */
        .upload-btn {
            background: #2b2b44;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: #b967ff;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #151525;
            transition: all 0.1s;
            border: 2px solid #b967ff;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-btn span {
            font-size: 1rem;
            color: white;
        }

        .upload-btn.active {
            background: #4a3970;
            color: white;
            border-color: white;
        }

        /* Barra de tamaño (zoom) expandida */
        .size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            flex: 1; /* Ocupa el espacio disponible */
        }

        .size-control i {
            font-size: 1.2rem;
            color: #b967ff;
        }

        #sizeSlider {
            flex: 1; /* La barra ocupa todo el ancho restante */
            height: 6px;
            background: #2b2b44;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #b967ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        /* Controles de rotación */
        .rotation-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 20px;
            width: 100%;
        }

        .rotation-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
        }

        .rotation-label {
            width: 25px;
            font-weight: bold;
            color: #b967ff;
        }

        .rotation-buttons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .rotation-btn {
            background: #2b2b44;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid #b967ff;
            font-size: 1rem;
        }

        .rotation-value {
            min-width: 50px;
            text-align: center;
            background: #151525;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .action-btn {
            background: none;
            border: 1px solid #b967ff;
            color: #b967ff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #b967ff;
            color: black;
        }

        .tutorial {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .tutorial.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .tutorial-content {
            background: #1e1e2f;
            border-radius: 30px;
            padding: 30px;
            max-width: 300px;
            text-align: center;
            border: 2px solid #b967ff;
        }

        .tutorial-content h2 {
            color: #b967ff;
            margin-bottom: 15px;
        }

        .tutorial-content p {
            margin: 10px 0;
        }

        .tutorial-content button {
            background: #b967ff;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
        }

        .error-message {
            position: absolute;
            bottom: 200px;
            left: 20px;
            right: 20px;
            background: #d32f2f;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 360px) {
            .upload-btn { font-size: 1.2rem; padding: 10px 16px; }
            #sizeSlider { height: 4px; }
            .rotation-btn { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <!-- Tutorial overlay -->
    <div class="tutorial" id="tutorial">
        <div class="tutorial-content">
            <h2><i class="fas fa-magic"></i> InkAR</h2>
            <p>1️⃣ Apunta a la imagen marcadora.</p>
            <p>2️⃣ Sube tu propia imagen con el botón <i class="fas fa-upload"></i>.</p>
            <p>3️⃣ Ajusta tamaño y rotación.</p>
            <p>4️⃣ Captura y comparte.</p>
            <button id="closeTutorial"><i class="fas fa-check"></i> ¡Entendido!</button>
        </div>
    </div>

    <div class="error-message" id="cameraError">
        <i class="fas fa-exclamation-triangle"></i> No se pudo acceder a la cámara. Verifica permisos.
    </div>

    <div class="marker-status" id="markerStatus">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Buscando...</span>
    </div>

    <div class="marker-thumb">
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" alt="Marcador">
    </div>

    <!-- Botón para plegar/desplegar el panel -->
    <div class="toggle-panel-btn" id="togglePanelBtn">
        <i class="fas fa-chevron-down"></i>
    </div>

    <!-- Panel de controles -->
    <div class="controls-panel" id="controlsPanel">
        <!-- Fila única: Botón subir + slider de tamaño -->
        <div class="row" style="justify-content: space-between;">
            <button class="upload-btn" id="uploadBtn" title="Subir imagen propia">
                <i class="fas fa-upload"></i> <span>Subir imagen</span>
            </button>
            <div class="size-control">
                <i class="fas fa-expand-alt"></i>
                <input type="range" id="sizeSlider" min="0.5" max="2.5" step="0.1" value="1.5">
            </div>
        </div>

        <!-- Controles de rotación multi-eje -->
        <div class="rotation-controls">
            <div class="rotation-row">
                <span class="rotation-label">X</span>
                <div class="rotation-buttons">
                    <button class="rotation-btn" id="rotXMinus">−</button>
                    <span class="rotation-value" id="rotXVal">0°</span>
                    <button class="rotation-btn" id="rotXPlus">+</button>
                </div>
            </div>
            <div class="rotation-row">
                <span class="rotation-label">Y</span>
                <div class="rotation-buttons">
                    <button class="rotation-btn" id="rotYMinus">−</button>
                    <span class="rotation-value" id="rotYVal">0°</span>
                    <button class="rotation-btn" id="rotYPlus">+</button>
                </div>
            </div>
            <div class="rotation-row">
                <span class="rotation-label">Z</span>
                <div class="rotation-buttons">
                    <button class="rotation-btn" id="rotZMinus">−</button>
                    <span class="rotation-value" id="rotZVal">0°</span>
                    <button class="rotation-btn" id="rotZPlus">+</button>
                </div>
            </div>
        </div>

        <!-- Fila de acciones: reiniciar rotación, eliminar imagen, capturar -->
        <div class="row" style="justify-content: space-between;">
            <div class="action-buttons">
                <button class="action-btn" id="resetRotation" title="Reiniciar rotación"><i class="fas fa-sync-alt"></i></button>
                <button class="action-btn" id="clearCustomBtn" title="Eliminar imagen personalizada"><i class="fas fa-trash-alt"></i></button>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="captureBtn" title="Capturar pantalla"><i class="fas fa-camera"></i></button>
            </div>
        </div>
    </div>

    <!-- Input oculto para seleccionar archivos -->
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <!-- Escena AR -->
    <a-scene
        id="scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; smooth: true;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="tatuaje"
                     src=""
                     position="0 0.2 0"
                     rotation="0 0 0"
                     width="1.2"
                     height="1.2"
                     material="transparent: true; depthTest: false; side: double;"
                     scale="1.5 1.5 1.5">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            // Elementos del DOM
            const scene = document.getElementById('scene');
            const tatuaje = document.getElementById('tatuaje');
            const sizeSlider = document.getElementById('sizeSlider');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const tutorial = document.getElementById('tutorial');
            const closeTutorialBtn = document.getElementById('closeTutorial');
            const captureBtn = document.getElementById('captureBtn');
            const cameraErrorDiv = document.getElementById('cameraError');
            const resetRotationBtn = document.getElementById('resetRotation');
            const toggleBtn = document.getElementById('togglePanelBtn');
            const controlsPanel = document.getElementById('controlsPanel');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const clearCustomBtn = document.getElementById('clearCustomBtn');

            // Elementos de rotación
            const rotXVal = document.getElementById('rotXVal');
            const rotYVal = document.getElementById('rotYVal');
            const rotZVal = document.getElementById('rotZVal');
            const rotXPlus = document.getElementById('rotXPlus');
            const rotXMinus = document.getElementById('rotXMinus');
            const rotYPlus = document.getElementById('rotYPlus');
            const rotYMinus = document.getElementById('rotYMinus');
            const rotZPlus = document.getElementById('rotZPlus');
            const rotZMinus = document.getElementById('rotZMinus');

            // Estado de la app
            let currentScale = 1.5;
            let rotationX = -180;
            let rotationY = 180;
            let rotationZ = 270;
            let customImageData = null; // Almacena la dataURL de la imagen subida

            // ========== PLEGAR / DESPLEGAR PANEL ==========
            toggleBtn.addEventListener('click', () => {
                controlsPanel.classList.toggle('hidden');
                toggleBtn.classList.toggle('hidden');
            });

            // ========== MANEJO DE IMAGEN PERSONALIZADA ==========
            uploadBtn.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataURL = event.target.result;
                    customImageData = dataURL;

                    // Activar visualmente el botón de subir
                    uploadBtn.classList.add('active');

                    // Asignar la imagen al tatuaje
                    tatuaje.setAttribute('src', dataURL);
                    applyRotationAndScale();
                    savePreferences(); // Guarda customImageData
                };
                reader.readAsDataURL(file);
            });

            // Botón para eliminar imagen personalizada
            clearCustomBtn.addEventListener('click', () => {
                if (customImageData) {
                    customImageData = null;
                    uploadBtn.classList.remove('active');
                    // Quitar la imagen (dejar en blanco)
                    tatuaje.setAttribute('src', '');
                    savePreferences(); // Guarda sin customImage
                }
            });

            // ========== PERSISTENCIA LOCAL ==========
            function loadPreferences() {
                try {
                    const saved = JSON.parse(localStorage.getItem('inkar_preferences'));
                    if (saved) {
                        currentScale = saved.scale || 1.5;
                        rotationX = saved.rotationX !== undefined ? saved.rotationX : -180;
                        rotationY = saved.rotationY || 180;
                        rotationZ = saved.rotationZ || 270;
                        customImageData = saved.customImage || null;

                        if (customImageData) {
                            uploadBtn.classList.add('active');
                            tatuaje.setAttribute('src', customImageData);
                        } else {
                            uploadBtn.classList.remove('active');
                            tatuaje.setAttribute('src', '');
                        }

                        sizeSlider.value = currentScale;
                        updateRotationDisplay(); // Aplica escala y rotación
                    } else {
                        // Valores por defecto
                        sizeSlider.value = currentScale;
                        updateRotationDisplay();
                    }
                } catch (e) {
                    console.warn('Error cargando preferencias', e);
                }
            }

            function savePreferences() {
                const prefs = {
                    scale: currentScale,
                    rotationX: rotationX,
                    rotationY: rotationY,
                    rotationZ: rotationZ,
                    customImage: customImageData
                };
                localStorage.setItem('inkar_preferences', JSON.stringify(prefs));
            }

            // ========== APLICAR ESCALA Y ROTACIÓN ==========
            function applyRotationAndScale() {
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                tatuaje.setAttribute('rotation', `${rotationX} ${rotationY} ${rotationZ}`);
            }

            function updateRotationDisplay() {
                rotXVal.innerText = rotationX + '°';
                rotYVal.innerText = rotationY + '°';
                rotZVal.innerText = rotationZ + '°';
                applyRotationAndScale();
                savePreferences();
            }

            // ========== EVENTOS DE ROTACIÓN ==========
            rotXPlus.addEventListener('click', () => { rotationX = (rotationX + 15) % 360; updateRotationDisplay(); });
            rotXMinus.addEventListener('click', () => { rotationX = (rotationX - 15) % 360; updateRotationDisplay(); });
            rotYPlus.addEventListener('click', () => { rotationY = (rotationY + 15) % 360; updateRotationDisplay(); });
            rotYMinus.addEventListener('click', () => { rotationY = (rotationY - 15) % 360; updateRotationDisplay(); });
            rotZPlus.addEventListener('click', () => { rotationZ = (rotationZ + 15) % 360; updateRotationDisplay(); });
            rotZMinus.addEventListener('click', () => { rotationZ = (rotationZ - 15) % 360; updateRotationDisplay(); });

            resetRotationBtn.addEventListener('click', () => {
                rotationX = -180;
                rotationY = 180;
                rotationZ = 270;
                updateRotationDisplay();
            });

            // ========== CAPTURA ==========
            captureBtn.addEventListener('click', () => {
                const canvas = document.querySelector('a-scene').canvas;
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = 'inkar-tatuaje.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } else {
                    alert('No se pudo capturar la imagen');
                }
            });

            // ========== EVENTO DEL SLIDER ==========
            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                savePreferences();
            });

            // ========== MARCADOR ==========
            const targetEntity = document.querySelector('[mindar-image-target]');
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', () => {
                    statusDot.classList.add('active');
                    statusText.innerText = 'Detectado';
                });
                targetEntity.addEventListener('targetLost', () => {
                    statusDot.classList.remove('active');
                    statusText.innerText = 'Buscando...';
                });
            }

            // ========== TUTORIAL ==========
            function hideTutorial() { tutorial.classList.add('hidden'); }
            closeTutorialBtn.addEventListener('click', hideTutorial);
            if (targetEntity) targetEntity.addEventListener('targetFound', hideTutorial);

            // ========== ERROR CÁMARA ==========
            navigator.mediaDevices.getUserMedia({ video: true })
                .catch((err) => {
                    console.error('Error cámara:', err);
                    cameraErrorDiv.style.display = 'block';
                    setTimeout(() => { cameraErrorDiv.style.display = 'none'; }, 5000);
                });

            // ========== INICIALIZACIÓN ==========
            scene.addEventListener('loaded', () => {
                loadPreferences();
                // Si hay imagen personalizada, ya se cargó; si no, solo aplicamos rotación y escala
                applyRotationAndScale();
            });

            // Respaldo
            setTimeout(() => {
                if (tatuaje.getAttribute('src') === '' && !customImageData) {
                    loadPreferences();
                    applyRotationAndScale();
                }
            }, 1500);
        })();
    </script>
</body>
</html>

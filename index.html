<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InkAR · Tatuajes Virtuales</title>
    <!-- Librerías A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
            touch-action: pan-y pinch-zoom; /* mejor manejo táctil */
        }

        /* Escena AR ocupa toda la pantalla */
        a-scene {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Recuadro guía animado (overlay) */
        .guide-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            height: 70vw;
            max-width: 350px;
            max-height: 350px;
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { border-color: rgba(255, 255, 255, 0.7); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); }
            50% { border-color: rgba(185, 103, 255, 0.9); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3); }
            100% { border-color: rgba(255, 255, 255, 0.7); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); }
        }

        /* Texto de instrucciones */
        .instruction-text {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 1rem;
            text-shadow: 0 2px 5px black;
            z-index: 60;
            padding: 0 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            width: auto;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 40px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Panel inferior de controles */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            transition: transform 0.3s;
        }

        /* Cuando se detecta el marcador, podemos ocultar el recuadro? (opcional) */
        .controls-panel.hidden {
            transform: translateY(100%);
        }

        .panel-section {
            margin-bottom: 15px;
        }

        .panel-section h4 {
            color: #b0b0d0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        /* Galería de iconos horizontal */
        .icon-gallery {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: thin;
            scrollbar-color: #b967ff #2b2b44;
            -webkit-overflow-scrolling: touch;
        }

        .icon-gallery button {
            background: #2b2b44;
            border: none;
            border-radius: 50px;
            padding: 12px 18px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #151525;
            transition: all 0.1s;
            flex: 0 0 auto;
            border: 2px solid transparent;
        }

        .icon-gallery button.active {
            border-color: #b967ff;
            background: #4a3970;
            transform: scale(1.02);
        }

        .icon-gallery button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #151525;
        }

        /* Controles de color y tamaño en fila */
        .row-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 40px;
        }

        .color-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: 0.1s;
        }

        .color-btn.black { background: #222; }
        .color-btn.red { background: #d32f2f; }
        .color-btn.blue { background: #1976d2; }
        .color-btn.gray { background: #757575; }
        .color-btn.active { border-color: white; transform: scale(1.15); }

        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 40px;
            color: white;
            flex: 1;
        }

        .size-control i {
            font-size: 1.2rem;
            color: #b967ff;
        }

        #sizeSlider {
            flex: 1;
            height: 5px;
            background: #2b2b44;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #b967ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        /* Estado del marcador */
        .marker-status {
            position: absolute;
            top: 80px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #b967ff;
            color: #b967ff;
            z-index: 70;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .marker-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            display: inline-block;
        }

        .marker-status .dot.active {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }

        /* Miniatura del marcador (para referencia) */
        .marker-thumb {
            position: absolute;
            bottom: 100px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid #b967ff;
            z-index: 70;
        }

        .marker-thumb img {
            width: 60px;
            border-radius: 8px;
            display: block;
        }

        /* Responsive para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .icon-gallery button { font-size: 1.5rem; padding: 10px 14px; }
            .color-btn { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>
    <!-- Estado del marcador -->
    <div class="marker-status" id="markerStatus">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Buscando marcador...</span>
    </div>

    <!-- Recuadro guía animado -->
    <div class="guide-overlay" id="guideOverlay"></div>

    <!-- Miniatura del marcador (opcional) -->
    <div class="marker-thumb">
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" alt="Marcador">
    </div>

    <!-- Panel de controles inferior -->
    <div class="controls-panel" id="controlsPanel">
        <div class="panel-section">
            <h4><i class="fas fa-icons"></i> Diseño</h4>
            <div class="icon-gallery" id="iconGallery">
                <button class="tattoo-btn active" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
                <button class="tattoo-btn" data-icon="fa-moon"><i class="fas fa-moon"></i></button>
                <button class="tattoo-btn" data-icon="fa-feather"><i class="fas fa-feather"></i></button>
                <button class="tattoo-btn" data-icon="fa-infinity"><i class="fas fa-infinity"></i></button>
                <button class="tattoo-btn" data-icon="fa-tree"><i class="fas fa-tree"></i></button>
                <button class="tattoo-btn" data-icon="fa-anchor"><i class="fas fa-anchor"></i></button>
                <button class="tattoo-btn" data-icon="fa-star"><i class="fas fa-star"></i></button>
                <button class="tattoo-btn" data-icon="fa-dreamcatcher"><i class="fas fa-dreamcatcher"></i></button>
            </div>
        </div>

        <div class="panel-section">
            <h4><i class="fas fa-palette"></i> Color y tamaño</h4>
            <div class="row-controls">
                <div class="color-picker">
                    <button class="color-btn black active" data-color="black" title="Negro"></button>
                    <button class="color-btn red" data-color="red" title="Rojo"></button>
                    <button class="color-btn blue" data-color="blue" title="Azul"></button>
                    <button class="color-btn gray" data-color="gray" title="Gris"></button>
                </div>
                <div class="size-control">
                    <i class="fas fa-expand-alt"></i>
                    <input type="range" id="sizeSlider" min="0.3" max="2.5" step="0.1" value="1.0">
                </div>
            </div>
        </div>
    </div>

    <!-- Escena AR -->
    <a-scene
        id="scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Assets: imágenes SVG de los iconos -->

            <img id="star" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='black' d='M528.1 171.5L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0L194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6zM388.6 312.3l23.7 138.4L288 385.4l-124.3 65.3 23.7-138.4-100.6-98 139-20.2 62.2-126 62.2 126 139 20.2-100.6 98z'%3E%3C/path%3E%3C/svg%3E">

            <img id="tree" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 384 512'%3E%3Cpath fill='black' d='M378.8 405.4l-96-144C272 245.3 244.3 232 214.3 232H169.7c-30 0-57.7 13.3-76.5 36.9l-96 144c-8.5 12.8-9.6 29.6-2.8 43.6c6.8 14 20.5 22.5 35.8 22.5h288c15.3 0 29-8.5 35.8-22.5c6.8-14 5.7-30.8-2.8-43.6zM224 56c0-13.3-10.7-24-24-24h-16c-13.3 0-24 10.7-24 24v80h64V56z'%3E%3C/path%3E%3C/svg%3E">

        </a-assets>

        <!-- Target con el modelo (plano) -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane id="tatuaje" src="#heart" width="1.2" height="1.2" position="0 0.1 0" rotation="-90 0 0" material="transparent: true; alphaTest: 0.1;"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            // Elementos del DOM
            const scene = document.getElementById('scene');
            const tatuaje = document.getElementById('tatuaje');
            const iconGallery = document.getElementById('iconGallery');
            const colorButtons = document.querySelectorAll('.color-btn');
            const sizeSlider = document.getElementById('sizeSlider');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const guideOverlay = document.getElementById('guideOverlay');

            // Variables de estado
            let currentIcon = '#heart';
            let currentColor = '#222222';
            let currentScale = 1.0;

            // Función para actualizar el color del tatuaje
            function updateColor(colorHex) {
                currentColor = colorHex;
                // Cambiamos el color del SVG mediante un filtro de tinte (no es directo)
                // Como es un sprite con textura, necesitamos recrear la textura con el color.
                // Por simplicidad, usaremos un material con color, pero como es una imagen, no funcionará.
                // Mejor: reasignar la imagen con el color modificado (no es trivial).
                // Para este demo, usaremos un truco: cambiar el color del material a blanco y aplicar un tinte con luz.
                // Pero lo más fácil es que el usuario vea el color del icono definido en el SVG (negro por defecto).
                // En una versión real, deberías generar un canvas coloreado. Lo dejamos como placeholder.
                // Aquí solo mostramos el cambio en el borde del botón activo.
            }

            // Eventos de la galería de iconos
            iconGallery.addEventListener('click', (e) => {
                const btn = e.target.closest('.tattoo-btn');
                if (!btn) return;
                const iconElem = btn.querySelector('i');
                let iconClass = '';
                for (let cls of iconElem.classList) {
                    if (cls.startsWith('fa-')) {
                        iconClass = cls;
                        break;
                    }
                }
                if (!iconClass) return;

                // Mapear clase de FontAwesome a ID del asset
                const map = {
                    'fa-heart': '#heart',
                    'fa-moon': '#moon',
                    'fa-feather': '#feather',
                    'fa-infinity': '#infinity',
                    'fa-tree': '#tree',
                    'fa-anchor': '#anchor',
                    'fa-star': '#star',
                    'fa-dreamcatcher': '#dreamcatcher'
                };
                const assetId = map[iconClass];
                if (assetId) {
                    tatuaje.setAttribute('src', assetId);
                }

                // Actualizar botón activo
                document.querySelectorAll('.tattoo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });

            // Eventos de color (solo estético, el color no cambia realmente en el SVG)
            colorButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    colorButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // Aquí podrías aplicar un filtro de color, pero lo omitimos por simplicidad.
                });
            });

            // Evento de tamaño
            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            });

            // Detección del marcador (eventos de MindAR)
            // MindAR emite eventos en el elemento <a-scene> o en el target
            const targetEntity = document.querySelector('[mindar-image-target]');
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', () => {
                    console.log('Marcador detectado');
                    statusDot.classList.add('active');
                    statusText.innerText = 'Marcador detectado';
                    guideOverlay.style.opacity = '0.3'; // atenuar guía cuando se detecta
                });
                targetEntity.addEventListener('targetLost', () => {
                    console.log('Marcador perdido');
                    statusDot.classList.remove('active');
                    statusText.innerText = 'Buscando marcador...';
                    guideOverlay.style.opacity = '1';
                });
            }

            // Si la escena carga, mostramos mensaje
            scene.addEventListener('loaded', () => {
                console.log('Escena AR cargada');
            });
        })();
    </script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InkAR · Tatuajes Virtuales</title>
    <!-- Librerías A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
            touch-action: pan-y pinch-zoom;
        }

        a-scene {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Recuadro guía estático (sin animación) */
        .guide-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            max-width: 280px;
            max-height: 280px;
            border: 2px solid rgba(185, 103, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 50;
            /* Sin animación */
        }

        /* Indicador de estado compacto */
        .marker-status {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid #b967ff;
            color: #b967ff;
            z-index: 70;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .marker-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f44336;
            display: inline-block;
            transition: background 0.2s;
        }

        .marker-status .dot.active {
            background: #4caf50;
        }

        /* Miniatura del marcador (pequeña) */
        .marker-thumb {
            position: absolute;
            bottom: 90px;
            left: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid #b967ff;
            z-index: 70;
        }

        .marker-thumb img {
            width: 45px;
            border-radius: 6px;
            display: block;
        }

        /* Panel inferior compacto */
        .controls-panel {
            position: absolute;
            bottom: 12px;
            left: 10px;
            right: 10px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Galería de iconos más pequeña */
        .icon-gallery {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: #b967ff #2b2b44;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

        .icon-gallery button {
            background: #2b2b44;
            border: none;
            border-radius: 40px;
            padding: 8px 12px;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 2px 0 #151525;
            transition: all 0.1s;
            flex: 0 0 auto;
            border: 1px solid transparent;
            min-width: 44px;
        }

        .icon-gallery button.active {
            border-color: #b967ff;
            background: #4a3970;
            transform: scale(1.02);
        }

        .icon-gallery button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #151525;
        }

        /* Selector de color compacto */
        .color-picker {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 30px;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.1s;
        }

        .color-btn.black { background: #222; }
        .color-btn.red { background: #d32f2f; }
        .color-btn.blue { background: #1976d2; }
        .color-btn.gray { background: #757575; }
        .color-btn.active { border-color: white; transform: scale(1.1); }

        /* Control de tamaño compacto */
        .size-control {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 30px;
            color: white;
        }

        .size-control i {
            font-size: 1rem;
            color: #b967ff;
        }

        #sizeSlider {
            width: 80px;
            height: 4px;
            background: #2b2b44;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #b967ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        @media (max-width: 380px) {
            .icon-gallery button { font-size: 1.1rem; padding: 6px 10px; }
            .color-btn { width: 28px; height: 28px; }
            #sizeSlider { width: 60px; }
        }
    </style>
</head>
<body>
    <!-- Estado del marcador -->
    <div class="marker-status" id="markerStatus">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Buscando...</span>
    </div>

    <!-- Recuadro guía estático (sin animación) -->
    <div class="guide-overlay" id="guideOverlay"></div>

    <!-- Miniatura del marcador -->
    <div class="marker-thumb">
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" alt="Marcador">
    </div>

    <!-- Panel de controles compacto -->
    <div class="controls-panel">
        <div class="row">
            <div class="icon-gallery" id="iconGallery">
                <button class="tattoo-btn active" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
                <button class="tattoo-btn" data-icon="fa-moon"><i class="fas fa-moon"></i></button>
                <button class="tattoo-btn" data-icon="fa-feather"><i class="fas fa-feather"></i></button>
                <button class="tattoo-btn" data-icon="fa-infinity"><i class="fas fa-infinity"></i></button>
                <button class="tattoo-btn" data-icon="fa-tree"><i class="fas fa-tree"></i></button>
                <button class="tattoo-btn" data-icon="fa-anchor"><i class="fas fa-anchor"></i></button>
                <button class="tattoo-btn" data-icon="fa-star"><i class="fas fa-star"></i></button>
                <button class="tattoo-btn" data-icon="fa-dreamcatcher"><i class="fas fa-dreamcatcher"></i></button>
            </div>
        </div>
        <div class="row" style="justify-content: space-between;">
            <div class="color-picker">
                <button class="color-btn black active" data-color="black" title="Negro"></button>
                <button class="color-btn red" data-color="red" title="Rojo"></button>
                <button class="color-btn blue" data-color="blue" title="Azul"></button>
                <button class="color-btn gray" data-color="gray" title="Gris"></button>
            </div>
            <div class="size-control">
                <i class="fas fa-expand-alt"></i>
                <input type="range" id="sizeSlider" min="0.3" max="2.0" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <!-- Escena AR -->
    <a-scene
        id="scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Target con el tatuaje (plano con textura de canvas dinámico) -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane id="tatuaje" position="0 0.1 0" rotation="-90 0 0" width="1.2" height="1.2" material="shader: flat; transparent: true;"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            // Elementos del DOM
            const scene = document.getElementById('scene');
            const tatuaje = document.getElementById('tatuaje');
            const iconGallery = document.getElementById('iconGallery');
            const colorButtons = document.querySelectorAll('.color-btn');
            const sizeSlider = document.getElementById('sizeSlider');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const guideOverlay = document.getElementById('guideOverlay');

            // Variables de estado
            let currentIcon = 'fa-heart';
            let currentColor = '#222222'; // negro
            let currentScale = 1.0;

            // Mapa de iconos a caracteres Unicode de FontAwesome
            const iconMap = {
                'fa-heart': '\u{f004}',
                'fa-moon': '\u{f186}',
                'fa-feather': '\u{f52d}',
                'fa-infinity': '\u{f534}',
                'fa-tree': '\u{f1bb}',
                'fa-anchor': '\u{f13d}',
                'fa-star': '\u{f005}',
                'fa-dreamcatcher': '\u{f77b}'
            };

            // Función para generar un canvas con el icono y color actual
            function generateTattooTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                // Limpiar con fondo transparente
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Configurar estilo de texto
                ctx.font = '400px "Font Awesome 6 Free"';
                ctx.fillStyle = currentColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Obtener carácter
                const char = iconMap[currentIcon] || '\u{f004}';
                ctx.fillText(char, 256, 256);

                return canvas;
            }

            // Función para actualizar la textura del tatuaje
            function updateTattoo() {
                const canvas = generateTattooTexture();
                // Crear textura a partir del canvas
                const texture = new THREE.CanvasTexture(canvas);
                // Aplicar al material del plano
                if (tatuaje && tatuaje.components && tatuaje.components.material) {
                    tatuaje.components.material.material.map = texture;
                    tatuaje.components.material.material.needsUpdate = true;
                } else {
                    // Si el componente no está listo, usar setAttribute
                    tatuaje.setAttribute('material', 'src', canvas.toDataURL());
                }
            }

            // Eventos de la galería de iconos
            iconGallery.addEventListener('click', (e) => {
                const btn = e.target.closest('.tattoo-btn');
                if (!btn) return;
                const iconElem = btn.querySelector('i');
                let iconClass = '';
                for (let cls of iconElem.classList) {
                    if (cls.startsWith('fa-')) {
                        iconClass = cls;
                        break;
                    }
                }
                if (!iconClass) return;

                currentIcon = iconClass;
                // Actualizar botón activo
                document.querySelectorAll('.tattoo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                updateTattoo();
            });

            // Eventos de color
            colorButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const colorKey = btn.dataset.color;
                    let colorHex = '#222222';
                    if (colorKey === 'red') colorHex = '#d32f2f';
                    else if (colorKey === 'blue') colorHex = '#1976d2';
                    else if (colorKey === 'gray') colorHex = '#757575';
                    currentColor = colorHex;

                    colorButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    updateTattoo();
                });
            });

            // Evento de tamaño
            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            });

            // Detección del marcador
            const targetEntity = document.querySelector('[mindar-image-target]');
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', () => {
                    console.log('Marcador detectado');
                    statusDot.classList.add('active');
                    statusText.innerText = 'Detectado';
                    guideOverlay.style.opacity = '0.3';
                });
                targetEntity.addEventListener('targetLost', () => {
                    console.log('Marcador perdido');
                    statusDot.classList.remove('active');
                    statusText.innerText = 'Buscando...';
                    guideOverlay.style.opacity = '1';
                });
            }

            // Inicializar la textura cuando la escena esté lista
            scene.addEventListener('loaded', () => {
                updateTattoo();
            });

            // Si el plano ya existe pero el material no está inicializado, intentar de nuevo
            setTimeout(() => {
                updateTattoo();
            }, 1000);
        })();
    </script>
</body>
</html>

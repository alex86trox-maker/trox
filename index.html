<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvitaFácil — Invitaciones Digitales Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=Pacifico&family=Montserrat:wght@500;600;700&family=Raleway:wght@400;500;600&family=Dancing+Script:wght@400;500;600&family=Tenor+Sans&family=Didact+Gothic&family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&family=Cinzel:wght@400;700&family=Amatic+SC:wght@400;700&family=Fredoka+One&family=Righteous&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <style>
        :root { 
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --gold: #d4af37;
            --gold-light: #f4e5b8;
            --gold-dark: #b8941f;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark-1: #0a0a0f;
            --dark-2: #12121a;
            --dark-3: #1a1a28;
            --dark-4: #222236;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family:'Lato',sans-serif; 
            background:var(--dark-1); 
            color:#f0ebe3; 
            overflow-x:hidden; 
            line-height:1.6;
            background-image: 
                radial-gradient(ellipse at top, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(212, 175, 55, 0.02) 0%, transparent 50%);
        }
        
        a,button { cursor:pointer; border:none; outline:none; font-family:inherit; text-decoration:none; }
        input,select,textarea { font-family:inherit; outline:none; }

        /* ═══ SCROLLBAR ULTRA PREMIUM ═══ */
        ::-webkit-scrollbar { width:10px; height:10px; }
        ::-webkit-scrollbar-track { background:rgba(0,0,0,0.4); border-radius:10px; }
        ::-webkit-scrollbar-thumb { 
            background:linear-gradient(180deg,var(--gold-light) 0%,var(--gold) 50%,var(--gold-dark) 100%); 
            border-radius:10px;
            box-shadow:inset 0 0 6px rgba(255,255,255,0.3),0 0 10px rgba(212,175,55,0.5);
        }
        ::-webkit-scrollbar-thumb:hover { 
            background:linear-gradient(180deg,#fff 0%,var(--gold-light) 50%,var(--gold) 100%);
            box-shadow:inset 0 0 8px rgba(255,255,255,0.5),0 0 15px rgba(212,175,55,0.8);
        }

        /* ═══ GALLERY ULTRA PREMIUM ═══ */
        #gallery-page { 
            min-height:100vh; 
            background:
                radial-gradient(ellipse at 20% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(212,175,55,0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0f 0%, #050508 100%);
            position:relative;
        }
        
        #gallery-page::before {
            content:'';
            position:fixed;
            inset:0;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(212,175,55,0.02) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(212,175,55,0.02) 0%, transparent 50%);
            pointer-events:none;
            z-index:0;
        }
        
        .gallery-header { 
            text-align:center; 
            padding:100px 24px 60px; 
            position:relative;
            z-index:1;
        }
        
        .gallery-header::before { 
            content:''; 
            position:absolute; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%);
            width:800px; 
            height:800px; 
            background:radial-gradient(circle,rgba(212,175,55,0.15) 0%,rgba(212,175,55,0.05) 40%,transparent 70%); 
            pointer-events:none;
            animation:headerGlow 8s ease-in-out infinite;
        }
        
        @keyframes headerGlow {
            0%,100% { opacity:0.6; transform:translate(-50%,-50%) scale(1); }
            50% { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
        }
        
        .gallery-header h1 { 
            font-family:'Great Vibes',cursive; 
            font-size:clamp(5rem,12vw,9rem); 
            line-height:1; 
            background:linear-gradient(135deg,
                #fff8e7 0%,
                #f4e5b8 20%,
                #d4af37 40%,
                #b8941f 60%,
                #d4af37 80%,
                #f4e5b8 100%);
            background-size:200% 200%;
            -webkit-background-clip:text; 
            -webkit-text-fill-color:transparent; 
            background-clip:text;
            filter:drop-shadow(0 0 30px rgba(212,175,55,0.4)) drop-shadow(0 10px 40px rgba(0,0,0,0.5));
            position:relative;
            animation:shimmer 4s ease-in-out infinite;
            letter-spacing:2px;
        }
        
        @keyframes shimmer {
            0%,100% { background-position:0% 50%; }
            50% { background-position:100% 50%; }
        }
        
        .gallery-header .subtitle { 
            font-size:0.75rem; 
            letter-spacing:12px; 
            text-transform:uppercase; 
            color:rgba(212,175,55,0.7); 
            margin-top:16px; 
            position:relative;
            font-weight:300;
        }
        
        .gallery-header .subtitle::before, 
        .gallery-header .subtitle::after { 
            content:'✦'; 
            color:var(--gold); 
            margin:0 16px; 
            font-size:0.7rem; 
            opacity:0.8;
            animation:starPulse 3s ease-in-out infinite;
        }
        
        @keyframes starPulse {
            0%,100% { opacity:0.5; transform:scale(1); }
            50% { opacity:1; transform:scale(1.2); }
        }
        
        .gallery-controls { 
            max-width:1200px; 
            margin:0 auto; 
            padding:0 20px 24px; 
            display:flex; 
            gap:16px; 
            flex-wrap:wrap;
            position:relative;
            z-index:1;
        }
        
        .search-box { 
            flex:1; 
            min-width:280px; 
            position:relative;
        }
        
        .search-box input { 
            width:100%; 
            padding:16px 24px 16px 56px; 
            background:linear-gradient(145deg,rgba(26,26,40,0.9),rgba(18,18,26,0.9));
            border:1px solid rgba(212,175,55,0.15);
            border-radius:99px; 
            color:#f0ebe3; 
            font-size:0.95rem; 
            transition:var(--transition);
            backdrop-filter:blur(20px);
            box-shadow:
                inset 0 2px 8px rgba(0,0,0,0.3),
                0 4px 20px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.05);
        }
        
        .search-box input:focus { 
            border-color:var(--gold);
            box-shadow:
                inset 0 2px 8px rgba(0,0,0,0.3),
                0 4px 20px rgba(0,0,0,0.3),
                0 0 0 1px rgba(212,175,55,0.3),
                0 0 30px rgba(212,175,55,0.2);
        }
        
        .search-icon { 
            position:absolute; 
            left:20px; 
            top:50%; 
            transform:translateY(-50%); 
            color:var(--gold);
            font-size:1.1rem;
            opacity:0.7;
        }
        
        .filter-btn { 
            padding:12px 24px; 
            border-radius:99px; 
            font-size:0.7rem; 
            letter-spacing:1.5px; 
            background:linear-gradient(145deg,rgba(26,26,40,0.9),rgba(18,18,26,0.9));
            border:1px solid rgba(212,175,55,0.15);
            color:rgba(240,235,227,0.7); 
            transition:var(--transition); 
            text-transform:uppercase;
            backdrop-filter:blur(20px);
            box-shadow:
                0 4px 16px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.05);
            font-weight:500;
        }
        
        .filter-btn:hover { 
            border-color:rgba(212,175,55,0.4);
            color:var(--gold-light);
            transform:translateY(-2px);
            box-shadow:
                0 8px 24px rgba(0,0,0,0.4),
                0 0 20px rgba(212,175,55,0.15),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .filter-btn.active { 
            background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,var(--gold-dark) 100%);
            color:var(--dark-1);
            border-color:var(--gold);
            font-weight:700;
            box-shadow:
                0 8px 32px rgba(212,175,55,0.5),
                0 0 40px rgba(212,175,55,0.3),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .gallery-stats { 
            max-width:1200px; 
            margin:0 auto; 
            padding:0 20px 20px; 
            font-size:0.75rem; 
            letter-spacing:3px; 
            color:rgba(212,175,55,0.6);
            position:relative;
            z-index:1;
        }
        
        .gallery-grid { 
            max-width:1200px; 
            margin:0 auto; 
            padding:0 20px 100px; 
            display:grid; 
            grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); 
            gap:28px;
            position:relative;
            z-index:1;
        }
        
        .gallery-card { 
            background:linear-gradient(145deg,rgba(26,26,40,0.95),rgba(18,18,26,0.95));
            border:1px solid rgba(212,175,55,0.1);
            border-radius:20px; 
            overflow:hidden; 
            cursor:pointer; 
            transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
            position:relative;
            backdrop-filter:blur(20px);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        .gallery-card::before { 
            content:''; 
            position:absolute; 
            inset:0; 
            border-radius:20px;
            padding:2px;
            background:linear-gradient(135deg,
                transparent 0%,
                rgba(212,175,55,0.4) 25%,
                rgba(244,229,184,0.6) 50%,
                rgba(212,175,55,0.4) 75%,
                transparent 100%);
            background-size:200% 200%;
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;
            mask-composite:exclude;
            opacity:0;
            transition:opacity 0.5s;
            pointer-events:none;
            animation:borderShimmer 3s linear infinite;
        }
        
        @keyframes borderShimmer {
            0% { background-position:0% 0%; }
            100% { background-position:200% 200%; }
        }
        
        .gallery-card:hover { 
            transform:translateY(-12px) scale(1.02);
            box-shadow:
                0 30px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(212,175,55,0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .gallery-card:hover::before { 
            opacity:1;
        }
        
        .gallery-card .preview { 
            height:220px; 
            position:relative; 
            overflow:hidden;
        }
        
        .gallery-card .preview-bg { 
            position:absolute; 
            inset:0; 
            background-size:cover; 
            background-position:center; 
            filter:brightness(0.5) saturate(1.1);
            transition:all 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        .gallery-card:hover .preview-bg { 
            transform:scale(1.12);
            filter:brightness(0.7) saturate(1.2);
        }
        
        .gallery-card .preview::after {
            content:'';
            position:absolute;
            inset:0;
            background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.4) 100%);
            pointer-events:none;
        }
        
        .gallery-card .preview-content { 
            position:relative; 
            z-index:1; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            justify-content:center; 
            height:100%; 
            text-align:center; 
            color:#fff; 
            text-shadow:0 4px 20px rgba(0,0,0,0.8);
            padding:24px;
        }
        
        .gallery-card .badge { 
            position:absolute; 
            top:16px; 
            left:16px; 
            background:linear-gradient(135deg,rgba(0,0,0,0.8),rgba(26,26,40,0.8));
            backdrop-filter:blur(20px);
            padding:6px 16px; 
            border-radius:99px; 
            font-size:0.65rem; 
            letter-spacing:2px; 
            text-transform:uppercase;
            border:1px solid rgba(212,175,55,0.3);
            z-index:2;
            box-shadow:0 4px 16px rgba(0,0,0,0.4);
            color:var(--gold-light);
        }
        
        .gallery-card .info { 
            padding:24px;
            position:relative;
        }
        
        .gallery-card .info h3 { 
            font-family:'Cormorant Garamond',serif; 
            font-size:1.4rem; 
            color:var(--gold);
            margin-bottom:8px;
            font-weight:600;
            text-shadow:0 2px 10px rgba(212,175,55,0.2);
        }
        
        .gallery-card .info p { 
            font-size:0.85rem; 
            color:rgba(240,235,227,0.6);
            line-height:1.6; 
            margin-bottom:16px;
        }
        
        .gallery-card .view-btn { 
            width:100%; 
            padding:14px; 
            border-radius:12px; 
            font-size:0.75rem; 
            letter-spacing:3px; 
            text-transform:uppercase; 
            font-weight:700;
            background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,var(--gold-dark) 100%);
            color:var(--dark-1);
            transition:all 0.4s;
            position:relative;
            overflow:hidden;
            box-shadow:
                0 4px 20px rgba(212,175,55,0.3),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .gallery-card .view-btn::before { 
            content:''; 
            position:absolute; 
            top:0; 
            left:-100%; 
            width:100%; 
            height:100%; 
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
            transition:left 0.6s;
        }
        
        .gallery-card:hover .view-btn::before { 
            left:100%;
        }
        
        .gallery-card:hover .view-btn {
            box-shadow:
                0 8px 32px rgba(212,175,55,0.5),
                0 0 40px rgba(212,175,55,0.3),
                inset 0 1px 0 rgba(255,255,255,0.4);
        }

        /* ═══ VIEWER ULTRA PREMIUM ═══ */
        #viewer-page { 
            display:none; 
            background:linear-gradient(180deg,#faf8f5 0%,#f5f0e8 100%);
        }
        
        #progress-bar { 
            position:fixed; 
            top:0; 
            left:0; 
            height:4px; 
            z-index:9990; 
            transition:width 0.1s linear;
            background:linear-gradient(90deg,
                var(--gold-light) 0%,
                var(--gold) 50%,
                var(--gold-dark) 100%);
            box-shadow:
                0 0 20px rgba(212,175,55,0.8),
                0 2px 10px rgba(212,175,55,0.5);
        }
        
        #particles-canvas { 
            position:fixed; 
            inset:0; 
            z-index:0; 
            pointer-events:none; 
            opacity:0.6;
        }

        /* ═══ BOTONES FLOTANTES ULTRA PREMIUM ═══ */
        .floating-actions { 
            position:fixed; 
            top:28px; 
            right:28px; 
            z-index:2000; 
            display:flex; 
            flex-direction:column; 
            gap:14px;
        }
        
        .float-btn { 
            display:flex; 
            align-items:center; 
            gap:12px; 
            padding:14px 26px; 
            border-radius:16px; 
            font-size:0.75rem; 
            font-weight:700;
            letter-spacing:2px; 
            text-transform:uppercase;
            backdrop-filter:blur(30px) saturate(200%);
            transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
            cursor:pointer;
            position:relative;
            overflow:hidden;
            box-shadow:
                0 10px 40px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .float-btn::before { 
            content:''; 
            position:absolute; 
            inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
            opacity:0;
            transition:opacity 0.4s;
        }
        
        .float-btn:hover::before { 
            opacity:1;
        }
        
        .float-btn:hover { 
            transform:translateY(-4px) scale(1.05);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .float-btn .btn-icon { 
            font-size:1.2rem;
            position:relative;
            z-index:1;
        }
        
        .float-btn span:not(.btn-icon) {
            position:relative;
            z-index:1;
        }
        
        .btn-publish { 
            background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);
            color:#fff;
            border:1px solid rgba(255,255,255,0.2);
        }
        
        .btn-publish:hover { 
            background:linear-gradient(135deg,#2dd46d 0%,#1bb34e 100%);
            box-shadow:
                0 20px 60px rgba(34,197,94,0.4),
                0 0 40px rgba(34,197,94,0.3),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .btn-edit { 
            background:linear-gradient(145deg,rgba(26,26,40,0.95),rgba(18,18,26,0.95));
            color:#fff;
            border:1px solid rgba(212,175,55,0.3);
        }
        
        .btn-edit:hover { 
            background:linear-gradient(145deg,rgba(34,34,52,0.95),rgba(26,26,40,0.95));
            border-color:var(--gold);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.4),
                0 0 30px rgba(212,175,55,0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .btn-back { 
            position:fixed; 
            top:28px; 
            left:28px; 
            z-index:2000; 
            display:flex; 
            align-items:center; 
            gap:12px; 
            padding:14px 26px; 
            border-radius:16px; 
            font-size:0.75rem; 
            font-weight:700;
            letter-spacing:2px; 
            text-transform:uppercase;
            backdrop-filter:blur(30px) saturate(200%);
            background:linear-gradient(145deg,rgba(26,26,40,0.95),rgba(18,18,26,0.95));
            color:#fff;
            border:1px solid rgba(212,175,55,0.3);
            cursor:pointer;
            transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow:
                0 10px 40px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .btn-back:hover { 
            background:linear-gradient(145deg,rgba(34,34,52,0.95),rgba(26,26,40,0.95));
            border-color:var(--gold);
            transform:translateY(-4px) scale(1.05);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.4),
                0 0 30px rgba(212,175,55,0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* ═══ SPLASH ULTRA PREMIUM ═══ */
        #splash { 
            position:fixed; 
            inset:0; 
            z-index:9999; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            cursor:pointer; 
            overflow:hidden;
        }
        
        #splash.out { 
            animation:splashFade 1.4s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        
        @keyframes splashFade { 
            0%{opacity:1;clip-path:inset(0 0 0 0);} 
            100%{opacity:0;clip-path:inset(0 0 100% 0);}
        }
        
        .sp-bg { 
            position:absolute; 
            inset:0; 
            background-size:cover; 
            background-position:center; 
            opacity:0.3;
            animation:spBgZoom 10s ease-out forwards;
        }
        
        @keyframes spBgZoom { 
            from{transform:scale(1.15);} 
            to{transform:scale(1);}
        }
        
        .sp-content { 
            position:relative; 
            z-index:2; 
            text-align:center;
        }
        
        .sp-pre { 
            font-size:0.65rem; 
            letter-spacing:12px; 
            text-transform:uppercase; 
            opacity:0; 
            animation:riseIn 1s 0.4s ease forwards;
        }
        
        .sp-names { 
            font-size:clamp(3.5rem,12vw,8rem); 
            line-height:0.9; 
            opacity:0; 
            animation:riseIn 1.2s 0.8s ease forwards;
            text-shadow:
                0 4px 40px rgba(0,0,0,0.6),
                0 0 80px rgba(212,175,55,0.3);
        }
        
        .sp-date { 
            font-size:0.8rem; 
            letter-spacing:10px; 
            text-transform:uppercase; 
            opacity:0; 
            animation:riseIn 0.9s 1.4s ease forwards;
            margin-top:24px;
        }
        
        .sp-cta { 
            font-size:0.65rem; 
            letter-spacing:6px; 
            text-transform:uppercase; 
            margin-top:48px; 
            opacity:0; 
            animation:riseIn 0.8s 1.8s ease forwards,ctaPulse 3s 2.6s infinite;
        }
        
        @keyframes riseIn { 
            from{opacity:0;transform:translateY(24px);} 
            to{opacity:1;transform:none;}
        }
        
        @keyframes ctaPulse { 
            0%,100%{opacity:0.3;} 
            50%{opacity:0.9;}
        }
        
        .splash-hidden { 
            display:none !important;
        }

        /* ═══ LIGHTBOX ULTRA PREMIUM ═══ */
        #lightbox { 
            position:fixed; 
            inset:0; 
            z-index:9998; 
            background:rgba(0,0,0,0.98);
            display:none; 
            align-items:center; 
            justify-content:center; 
            flex-direction:column;
            backdrop-filter:blur(20px);
        }
        
        #lightbox.active { 
            display:flex;
            animation:fadeIn 0.4s;
        }
        
        @keyframes fadeIn { 
            from{opacity:0;} 
            to{opacity:1;}
        }
        
        #lightbox img { 
            max-width:86vw; 
            max-height:80vh; 
            object-fit:contain; 
            border-radius:8px;
            box-shadow:
                0 30px 100px rgba(0,0,0,0.8),
                0 0 60px rgba(212,175,55,0.1);
        }
        
        .lb-cap { 
            font-size:0.65rem; 
            letter-spacing:5px; 
            text-transform:uppercase; 
            color:rgba(212,175,55,0.7);
            margin-top:20px;
        }
        
        .lb-btn { 
            position:fixed; 
            top:50%; 
            transform:translateY(-50%);
            background:linear-gradient(145deg,rgba(26,26,40,0.9),rgba(18,18,26,0.9));
            backdrop-filter:blur(20px);
            border:1px solid rgba(212,175,55,0.3);
            color:var(--gold-light);
            padding:18px 22px;
            font-size:1.6rem;
            cursor:pointer;
            transition:all 0.4s;
            border-radius:50%;

    html+=`<section id="countdown" style="background:${p.card};padding:90px 40px;text-align:center;"><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:10px;text-transform:uppercase;color:${p.primary};">El gran día se acerca</div><div style="font-family:${f.display};font-size:clamp(2rem,5vw,3.5rem);color:${p.text};margin-top:12px;">Faltan <em style="color:${p.primary};">solo</em></div><div style="display:flex;justify-content:center;gap:0;margin-top:56px;flex-wrap:wrap;">${['Días','Horas','Min','Seg'].map((l,i)=>`<div style="text-align:center;padding:0 40px;"><span id="cdv${i}" style="font-family:${f.display};font-size:clamp(3rem,6vw,5rem);color:${p.text};display:inline-block;transition:transform 0.3s;">00</span><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:8px;color:${p.textLight};margin-top:12px;">${l}</div></div>`).join('')}</div></section>`;
    if(hasSection('story')&&ST.storyTitle){
        html+=`<section style="background:${p.bg};padding:90px 40px;"><div style="max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:center;"><div><img src="${ST.heroImage}" style="width:100%;border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,0.3),0 0 40px rgba(212,175,55,0.1);"></div><div><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:10px;color:${p.primary};">${ST.storyEyebrow||'Nuestra historia'}</div><h2 style="font-family:${f.display};font-size:clamp(2rem,5vw,3.5rem);color:${p.text};margin:12px 0 24px;">${ST.storyTitle}</h2><p style="font-style:italic;color:${p.textLight};line-height:1.9;font-size:1.1rem;">${ST.storyText1}</p><p style="color:${p.textLight};margin-top:16px;line-height:1.8;">${ST.storyText2}</p><div style="display:flex;gap:28px;margin-top:28px;">${ST.timeline.map(tl=>`<div><div style="font-family:${f.display};font-size:2.2rem;color:${p.primary};">${tl.year}</div><div style="font-size:0.75rem;color:${p.textLight};margin-top:4px;">${tl.event}</div></div>`).join('')}</div></div></div></section>`;
    }
    if(hasSection('details')){
        html+=`<section id="detalles" style="background:${p.card};padding:90px 40px;"><div style="text-align:center;margin-bottom:56px;"><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:10px;color:${p.primary};">Todo lo que necesitas saber</div><h2 style="font-family:${f.display};font-size:clamp(2rem,5vw,3.5rem);color:${p.text};margin-top:12px;">La <em style="color:${p.primary};">Celebración</em></h2></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:${p.textLight}22;max-width:1000px;margin:0 auto 56px;border-radius:16px;overflow:hidden;">${[{n:'I',l:'Fecha',v:ST.eventDateDisplay},{n:'II',l:'Hora',v:ST.eventTime},{n:'III',l:'Lugar',v:ST.venue+'<br>'+ST.address+'<br>'+ST.city},{n:'IV',l:'Dress Code',v:ST.dresscode}].map(d=>`<div style="background:${p.card};padding:44px 32px;text-align:center;"><div style="font-family:${f.display};font-size:2.2rem;font-style:italic;color:${p.textLight}33;">${d.n}</div><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:8px;color:${p.primary};margin:12px 0;">${d.l}</div><div style="font-family:${f.display};font-style:italic;color:${p.textLight};line-height:1.6;">${d.v}</div></div>`).join('')}</div>`;
        if(hasSection('program')&&ST.programItems&&ST.programItems.length){
            html+=`<div style="max-width:700px;margin:0 auto 56px;"><div style="display:flex;align-items:center;gap:24px;margin-bottom:36px;"><span style="flex:1;height:1px;background:${p.textLight}22;"></span><span style="font-family:${f.display};font-style:italic;color:${p.textLight};font-size:1.1rem;">Programa</span><span style="flex:1;height:1px;background:${p.textLight}22;"></span></div>${ST.programItems.map(pi=>`<div style="display:grid;grid-template-columns:80px 1px 1fr;gap:0 28px;padding:20px 0;border-bottom:1px solid ${p.textLight}11;"><div style="font-family:${f.display};font-size:1.2rem;font-style:italic;color:${p.primary};text-align:right;">${pi.time}</div><div style="background:${p.textLight}22;position:relative;"><div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;border:2px solid ${p.primary};background:${p.card};"></div></div><div><strong style="font-family:${f.heading};font-size:0.75rem;letter-spacing:4px;color:${p.text};">${pi.event}</strong><p style="font-style:italic;color:${p.textLight};margin-top:4px;">${pi.desc}</p></div></div>`).join('')}</div>`;
        }
        html+=`</section>`;
    }
    if(hasSection('map')){
        html+=`<section style="background:${p.bg};padding:70px 40px;text-align:center;"><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:10px;color:${p.primary};margin-bottom:12px;">Cómo llegar</div><h2 style="font-family:${f.display};font-size:clamp(2rem,5vw,3rem);color:${p.text};margin-bottom:36px;">Ubicación</h2><div class="map-container" style="max-width:800px;margin:0 auto;"><iframe src="https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${mapQuery}" width="100%" height:380" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div><p style="margin-top:20px;"><a href="https://www.google.com/maps?q=${mapQuery}" target="_blank" style="color:${p.primary};font-family:${f.heading};font-size:0.75rem;letter-spacing:3px;">Abrir en Google Maps →</a></p></section>`;
    }
    if(hasSection('gallery')){
        html+=`<section style="background:${p.card};padding:90px 40px;"><div style="text-align:center;margin-bottom:56px;"><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:10px;color:${p.primary};">Recuerdos que guardamos</div><h2 style="font-family:${f.display};font-size:clamp(2rem,5vw,3.5rem);color:${p.text};margin-top:12px;">Nuestra <em style="color:${p.primary};">Galería</em></h2></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;max-width:1100px;margin:0 auto;">${ST.galleryImages.map((img,i)=>`<div style="overflow:hidden;border-radius:12px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,0.15);" onclick="openLB(${i})"><img src="${img.src}" alt="${img.cap}" style="width:100%;aspect-ratio:4/3;object-fit:cover;transition:transform 0.6s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'"></div>`).join('')}</div></section>`;
    }
    if(hasSection('rsvp')){
        html+=`<section id="rsvp" style="background:${p.bg};padding:90px 40px;"><div style="max-width:800px;margin:0 auto;text-align:center;"><div style="font-family:${f.heading};font-size:0.6rem;letter-spacing:10px;color:${p.primary};">Tu presencia es nuestro regalo</div><h2 style="font-family:${f.display};font-size:clamp(2rem,5vw,3rem);color:${p.text};margin:12px 0 24px;">Confirmar <em style="color:${p.primary};">Asistencia</em></h2><p style="color:${p.textLight};margin-bottom:36px;">Confírmanos antes del <strong>${ST.rsvpDeadline}</strong></p><form id="rsvp-form" onsubmit="submitRSVP(event)" style="max-width:500px;margin:0 auto;"><input type="text" id="rsvp-name" required placeholder="Tu nombre completo" style="width:100%;padding:16px;background:transparent;border:2px solid ${p.textLight}44;border-radius:10px;font-family:${f.display};font-style:italic;font-size:1.05rem;color:${p.text};margin-bottom:18px;transition:all 0.4s;" onfocus="this.style.borderColor='${p.primary}';this.style.boxShadow='0 0 0 4px ${p.primary}33'" onblur="this.style.borderColor='${p.textLight}44';this.style.boxShadow='none'"><input type="text" id="rsvp-guests" placeholder="Número de acompañantes" style="width:100%;padding:16px;background:transparent;border:2px solid ${p.textLight}44;border-radius:10px;font-family:${f.display};font-style:italic;font-size:1.05rem;color:${p.text};margin-bottom:18px;transition:all 0.4s;" onfocus="this.style.borderColor='${p.primary}';this.style.boxShadow='0 0 0 4px ${p.primary}33'" onblur="this.style.borderColor='${p.textLight}44';this.style.boxShadow='none'"><textarea id="rsvp-message" rows="3" placeholder="Mensaje para los anfitriones" style="width:100%;padding:16px;background:transparent;border:2px solid ${p.textLight}44;border-radius:10px;font-family:${f.display};font-style:italic;font-size:1.05rem;color:${p.text};margin-bottom:24px;resize:none;transition:all 0.4s;" onfocus="this.style.borderColor='${p.primary}';this.style.boxShadow='0 0 0 4px ${p.primary}33'" onblur="this.style.borderColor='${p.textLight}44';this.style.boxShadow='none'"></textarea><button type="submit" style="width:100%;padding:18px;background:${p.primary};color:${p.bg};font-family:${f.heading};font-size:0.75rem;letter-spacing:5px;text-transform:uppercase;border-radius:10px;transition:all 0.4s;font-weight:700;box-shadow:0 6px 30px ${p.primary}66;" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 12px 40px ${p.primary}88'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 6px 30px ${p.primary}66'">Enviar Confirmación por WhatsApp</button></form><div id="rsvp-thx" style="display:none;text-align:center;padding:36px;"><div style="font-size:3.5rem;">🌸</div><h3 style="font-family:${f.display};font-size:1.6rem;color:${p.text};margin:16px 0;">¡Gracias!</h3><p style="color:${p.textLight};">Te esperamos con mucha ilusión</p></div></div></section>`;
    }
    html+=`<footer style="background:${p.text};color:${p.bg};padding:70px 40px;text-align:center;"><div style="font-family:${f.display};font-size:clamp(2rem,6vw,4rem);font-style:italic;color:${p.primary};">${title}</div><div style="font-family:${f.heading};font-size:0.7rem;letter-spacing:10px;color:${p.bg}55;margin-top:16px;">${ST.city} · ${ST.eventDateDisplay}</div><p style="font-style:italic;color:${p.bg}44;margin-top:24px;">${ST.footerVerse}</p></footer>`;
    document.getElementById("viewer-content").innerHTML=html;
}

function showSplash(){const s=document.getElementById("splash");const p={bg:ST.bgColor,primary:ST.buttonColor,secondary:ST.secondaryColor,text:ST.textColor};s.style.background=ST.bgColor;s.innerHTML=`<div class="sp-bg" style="background-image:url(${ST.heroImage})"></div><div class="sp-content"><div class="sp-pre" style="color:${p.primary};">${ST.splashLabel}</div><div class="sp-names" style="font-family:${ST.fontDisplay};color:${p.text};">${ST.person1} ${ST.connector||'&'} ${ST.person2}</div><div class="sp-date" style="color:${p.textLight};">${ST.eventDateDisplay}</div><div class="sp-cta" style="color:${p.primary}88;">Toca para entrar</div></div>`;s.classList.remove('out','splash-hidden');s.onclick=()=>{s.classList.add('out');setTimeout(()=>s.classList.add('splash-hidden'),1400);};setTimeout(()=>{if(!s.classList.contains('out'))s.click();},5000);}
function closeSplash(){const s=document.getElementById("splash");s.classList.add('out');setTimeout(()=>s.classList.add('splash-hidden'),1400);}
function startCountdown(){if(cdInterval)clearInterval(cdInterval);updateCD();cdInterval=setInterval(updateCD,1000);}
function updateCD(){const diff=Math.max(0,new Date(ST.eventDate).getTime()-Date.now());const vals=[Math.floor(diff/86400000),Math.floor((diff%86400000)/3600000),Math.floor((diff%3600000)/60000),Math.floor((diff%60000)/1000)];vals.forEach((v,i)=>{const el=document.getElementById('cdv'+i);if(el){el.textContent=String(v).padStart(2,'0');el.style.transform='scale(1.08)';setTimeout(()=>{el.style.transform='scale(1)';},200);}});}
function startParticles(){if(animFrame)cancelAnimationFrame(animFrame);const canvas=document.getElementById('particles-canvas');const ctx=canvas.getContext('2d');const colorMap={petals:['#f4bfca','#e8a4b8'],stars:['#ffe082','#ffffff'],confetti:['#ff6f00','#2196f3','#e91e8c'],bubbles:[ST.secondaryColor,ST.buttonColor+'88'],none:[]};const colors=colorMap[ST.particles]||[];if(!colors.length)return;let W,H,particles=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;particles=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,size:Math.random()*8+3,speedX:(Math.random()-0.5)*0.8,speedY:Math.random()*0.6+0.3,color:colors[Math.floor(Math.random()*colors.length)],opacity:Math.random()*0.5+0.3}));}resize();window.addEventListener('resize',resize);function draw(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.x+=p.speedX;p.y+=p.speedY;if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.opacity;ctx.fill();});ctx.globalAlpha=1;animFrame=requestAnimationFrame(draw);}draw();}

function submitRSVP(e){e.preventDefault();const name=document.getElementById('rsvp-name').value.trim();const guests=document.getElementById('rsvp-guests').value.trim();const message=document.getElementById('rsvp-message').value.trim();if(!name){showToast('Por favor ingresa tu nombre');return;}const whatsappNumber=ST.whatsappNumber||'';if(whatsappNumber){const text=`Hola, soy ${name}. Confirmo mi asistencia${guests?' con '+guests+' acompañante(s)':''}.${message?' '+message:''}`;const url=`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`;window.open(url,'_blank');document.getElementById('rsvp-form').style.display='none';const thx=document.getElementById('rsvp-thx');if(thx)thx.style.display='block';showToast('Redirigiendo a WhatsApp...');}else{showToast('El anfitrión no ha configurado WhatsApp aún.');}}

function openLB(i){lbIdx=i;document.getElementById('lb-img').src=ST.galleryImages[i].src;document.getElementById('lb-cap').textContent=ST.galleryImages[i].cap;document.getElementById('lightbox').classList.add('active');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');}
function navLB(d){lbIdx=(lbIdx+d+ST.galleryImages.length)%ST.galleryImages.length;document.getElementById('lb-img').src=ST.galleryImages[lbIdx].src;document.getElementById('lb-cap').textContent=ST.galleryImages[lbIdx].cap;}

/* PUBLICACIÓN */
function buildPublishPayload(){return{...ST,galleryImages:ST.galleryImages.map(g=>({src:g.src,cap:g.cap}))};}
function generatePublishLink(){const json=JSON.stringify(buildPublishPayload());const compressed=LZString.compressToEncodedURIComponent(json);const url=new URL(window.location.href);url.hash='invite='+compressed;return url.toString();}
function openPublishModal(){document.getElementById("pub-link-input").value=generatePublishLink();document.getElementById("publish-modal").classList.add('active');}
function closePublishModal(){document.getElementById("publish-modal").classList.remove('active');}
function copyPublishLink(){const i=document.getElementById("pub-link-input");i.select();navigator.clipboard.writeText(i.value);showToast('¡Enlace copiado! 📋');}
function previewPublished(){window.open(document.getElementById("pub-link-input").value,'_blank');}
function downloadHTML(){const link=generatePublishLink();const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Invitación</title><script>window.location.href='${link}';<\/script></head><body>Cargando...</body></html>`;const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='invitacion.html';a.click();}
function loadFromHash(){const hash=window.location.hash;if(!hash.startsWith('#invite='))return false;try{const json=LZString.decompressFromEncodedURIComponent(hash.replace('#invite=',''));const payload=JSON.parse(json);if(!payload.templateId)return false;const template=TEMPLATES.find(t=>t.id===payload.templateId);if(!template)return false;currentTemplate=template;ST=payload;document.getElementById("gallery-page").style.display='none';document.getElementById("viewer-page").style.display='block';render();startParticles();startCountdown();setTimeout(closeSplash,2000);showSplash();return true;}catch(e){return false;}}

/* EDITOR */
function openEditor(){document.getElementById("editor-backdrop").classList.add('active');document.getElementById("editor-panel").classList.add('active');document.getElementById("ed-template-badge").textContent=currentTemplate?.name||'';edFill();}
function closeEditor(){document.getElementById("editor-backdrop").classList.remove('active');document.getElementById("editor-panel").classList.remove('active');}
function switchEdTab(btn){document.querySelectorAll('.ed-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('panel-'+btn.dataset.tab).classList.add('active');}
function edFill(){document.getElementById("ed-splashLabel").value=ST.splashLabel||'';document.getElementById("ed-p1").value=ST.person1;document.getElementById("ed-p2").value=ST.person2;document.getElementById("ed-conn").value=ST.connector;document.getElementById("ed-dateDisp").value=ST.eventDateDisplay;document.getElementById("ed-eventDate").value=ST.eventDate?ST.eventDate.slice(0,16):'';document.getElementById("ed-venue").value=ST.venue||'';document.getElementById("ed-address").value=ST.address||'';document.getElementById("ed-city").value=ST.city||'';document.getElementById("ed-eventTime").value=ST.eventTime||'';document.getElementById("ed-dresscode").value=ST.dresscode||'';document.getElementById("ed-footerVerse").value=ST.footerVerse||'';document.getElementById("ed-bgC").value=ST.bgColor;document.getElementById("ed-bgCT").value=ST.bgColor;document.getElementById("ed-btnC").value=ST.buttonColor;document.getElementById("ed-btnCT").value=ST.buttonColor;document.getElementById("ed-secC").value=ST.secondaryColor;document.getElementById("ed-secCT").value=ST.secondaryColor;document.getElementById("ed-whatsapp").value=ST.whatsappNumber||'';document.getElementById("ed-hero-img").src=ST.heroImage;document.getElementById("ed-music").value=ST.musicYoutubeId?`https://youtube.com/watch?v=${ST.musicYoutubeId}`:'';buildGalThumbs();}
function edUpdate(){ST.splashLabel=document.getElementById("ed-splashLabel").value;ST.person1=document.getElementById("ed-p1").value;ST.person2=document.getElementById("ed-p2").value;ST.connector=document.getElementById("ed-conn").value;ST.eventDateDisplay=document.getElementById("ed-dateDisp").value;const dv=document.getElementById("ed-eventDate").value;if(dv)ST.eventDate=dv+":00";ST.venue=document.getElementById("ed-venue").value;ST.address=document.getElementById("ed-address").value;ST.city=document.getElementById("ed-city").value;ST.eventTime=document.getElementById("ed-eventTime").value;ST.dresscode=document.getElementById("ed-dresscode").value;ST.footerVerse=document.getElementById("ed-footerVerse").value;ST.bgColor=document.getElementById("ed-bgC").value;ST.buttonColor=document.getElementById("ed-btnC").value;ST.secondaryColor=document.getElementById("ed-secC").value;ST.whatsappNumber=document.getElementById("ed-whatsapp").value;document.getElementById("ed-bgCT").value=ST.bgColor;document.getElementById("ed-btnCT").value=ST.buttonColor;document.getElementById("ed-secCT").value=ST.secondaryColor;render();}
function buildGalThumbs(){const c=document.getElementById("ed-gal-thumbs");c.innerHTML=ST.galleryImages.map((img,i)=>`<div style="position:relative;aspect-ratio:1;overflow:hidden;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.4);border:2px solid rgba(212,175,55,0.2);"><img src="${img.src}" style="width:100%;height:100%;object-fit:cover;"><button onclick="rmGal(${i})" style="position:absolute;top:3px;right:3px;background:linear-gradient(135deg,rgba(239,68,68,0.95),rgba(220,38,38,0.95));color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:0.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;box-shadow:0 2px 8px rgba(239,68,68,0.4);" onmouseover="this.style.transform='scale(1.15)';this.style.boxShadow='0 4px 12px rgba(239,68,68,0.6)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 2px 8px rgba(239,68,68,0.4)'">×</button></div>`).join('');}
function rmGal(i){ST.galleryImages.splice(i,1);buildGalThumbs();render();}
function edHeroUpload(e){const f=e.target.files[0];if(!f)return;ST.heroImage=URL.createObjectURL(f);document.getElementById("ed-hero-img").src=ST.heroImage;render();}
function edGalUpload(e){Array.from(e.target.files).forEach(f=>ST.galleryImages.push({src:URL.createObjectURL(f),cap:f.name}));buildGalThumbs();render();}
function edMusicUpdate(){ST.musicYoutubeId=document.getElementById("ed-music").value.split('v=')[1]?.split('&')[0]||'';render();}

window.addEventListener('scroll',()=>{const pct=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;document.getElementById('progress-bar').style.width=pct+'%';});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closePublishModal();closeEditor();}});
if(!loadFromHash()){initGallery();}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvitaFácil — Invitaciones Digitales Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=Pacifico&family=Montserrat:wght@500;600;700&family=Raleway:wght@400;500;600&family=Dancing+Script:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <style>
        :root {
            --bg: #0b0b10;
            --surface: #16161f;
            --surface2: #1e1e2a;
            --border: rgba(255,255,255,0.06);
            --text: #e8e8f0;
            --text2: #9d9db0;
            --accent: #c9a96e;
            --accent2: #d4b87a;
            --green: #2dd4bf;
            --radius: 16px;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'DM Sans', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); overflow-x:hidden; line-height:1.5; }
        ::selection { background:var(--accent); color:#0b0b10; }
        a, button { cursor:pointer; border:none; outline:none; font-family:inherit; }
        input, select, textarea { font-family:inherit; outline:none; }

        /* ─── GALLERY ─── */
        #gallery-page { min-height:100vh; }
        .gallery-header { text-align:center; padding:80px 24px 56px; position:relative; }
        .gallery-header h1 { font-family:'Great Vibes',cursive; font-size:clamp(4rem,10vw,7rem); color:var(--accent); line-height:1; }
        .gallery-header .subtitle { font-size:0.7rem; letter-spacing:8px; text-transform:uppercase; color:var(--text2); margin-top:8px; }
        .gallery-controls { max-width:1200px; margin:0 auto; padding:0 20px 20px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
        .search-box { flex:1; min-width:240px; position:relative; }
        .search-box input { width:100%; padding:14px 20px 14px 48px; background:var(--surface); border:1px solid var(--border); border-radius:99px; color:var(--text); font-size:0.9rem; transition:var(--transition); }
        .search-box input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(201,169,110,0.1); }
        .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--text2); }
        .filter-btn { padding:10px 20px; border-radius:99px; font-size:0.75rem; letter-spacing:1px; background:var(--surface); border:1px solid var(--border); color:var(--text2); transition:var(--transition); }
        .filter-btn.active { background:var(--accent); color:#0b0b10; border-color:var(--accent); font-weight:600; }
        .gallery-stats { max-width:1200px; margin:0 auto; padding:0 20px 16px; font-size:0.7rem; letter-spacing:2px; color:var(--text2); }
        .gallery-grid { max-width:1200px; margin:0 auto; padding:0 20px 80px; display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:24px; }
        .gallery-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:var(--transition); }
        .gallery-card:hover { transform:translateY(-6px); box-shadow:var(--shadow); border-color:var(--accent); }
        .gallery-card .preview { height:200px; position:relative; overflow:hidden; }
        .gallery-card .preview-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.5); transition:0.4s; }
        .gallery-card:hover .preview-bg { transform:scale(1.05); filter:brightness(0.7); }
        .gallery-card .preview-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.6); }
        .gallery-card .badge { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); padding:4px 12px; border-radius:99px; font-size:0.65rem; letter-spacing:1px; }
        .gallery-card .info { padding:20px; }
        .gallery-card .info h3 { font-family:'Cormorant Garamond',serif; font-size:1.3rem; color:var(--accent); margin-bottom:4px; }
        .gallery-card .info p { font-size:0.8rem; color:var(--text2); line-height:1.5; margin-bottom:12px; }
        .gallery-card .tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
        .gallery-card .tag { padding:4px 10px; border-radius:99px; font-size:0.65rem; background:rgba(255,255,255,0.03); border:1px solid var(--border); color:var(--text2); }
        .view-btn { width:100%; padding:12px; border-radius:8px; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; font-weight:600; background:var(--accent); color:#0b0b10; transition:var(--transition); }
        .view-btn:hover { background:var(--accent2); }

        /* ─── VIEWER ─── */
        #viewer-page { display:none; }
        #progress-bar { position:fixed; top:0; left:0; height:3px; z-index:9990; background:linear-gradient(to right, var(--accent), var(--green)); transition:width 0.1s; }
        #particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:1; opacity:0.6; }
        .nav-btn { position:fixed; top:24px; z-index:2000; padding:10px 20px; border-radius:99px; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; backdrop-filter:blur(20px); background:rgba(20,20,30,0.7); border:1px solid rgba(255,255,255,0.1); color:#fff; transition:var(--transition); display:flex; align-items:center; gap:8px; }
        .nav-btn:hover { background:rgba(255,255,255,0.1); }
        .btn-back { left:24px; }
        .btn-publish { right:160px; background:var(--green); border-color:var(--green); color:#0b0b10; font-weight:600; }
        .btn-edit { right:24px; }

        #splash { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; cursor:pointer; animation:fadeIn 0.4s; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .splash-hidden { display:none !important; }

        .inv-hero { position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .hero-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.35); }
        .hero-content { position:relative; z-index:10; text-align:center; padding:40px; }
        .hero-classic .hero-content, .hero-vintage .hero-content, .hero-playful .hero-content { text-align:center; }
        .hero-modern .hero-content { text-align:left; max-width:700px; margin-left:5%; }

        .inv-section { padding:60px 20px; }
        .sec-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,5vw,3.5rem); margin-bottom:32px; text-align:center; }
        .details-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; max-width:900px; margin:0 auto; }
        .det-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; text-align:center; }
        .rsvp-card { max-width:500px; margin:0 auto; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:32px; }
        .inv-footer { padding:60px 20px; text-align:center; background:var(--surface); }

        #music-player { position:fixed; bottom:24px; right:24px; z-index:900; display:none; }

        /* ─── EDITOR ─── */
        #editor-backdrop { position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:none; }
        #editor-backdrop.active { display:block; }
        #editor-panel { position:fixed; top:0; right:0; bottom:0; z-index:3001; width:100%; max-width:420px; background:var(--surface); border-left:1px solid var(--border); display:none; flex-direction:column; overflow:hidden; box-shadow:-20px 0 60px rgba(0,0,0,0.5); }
        #editor-panel.active { display:flex; animation:slideIn 0.3s ease; }
        @keyframes slideIn { from{transform:translateX(100%);} to{transform:translateX(0);} }
        .ed-header { padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .ed-tabs { display:flex; overflow-x:auto; border-bottom:1px solid var(--border); }
        .ed-tab { flex:1; padding:14px 10px; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; background:transparent; color:var(--text2); border-bottom:2px solid transparent; transition:var(--transition); }
        .ed-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
        .ed-content { flex:1; overflow-y:auto; padding:20px; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .ed-field { margin-bottom:20px; }
        .ed-field label { display:block; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--text2); margin-bottom:6px; }
        .ed-field input, .ed-field select, .ed-field textarea { width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.85rem; }
        .color-row { display:flex; gap:8px; align-items:center; }
        .color-row input[type="color"] { width:40px; height:40px; padding:2px; border-radius:8px; }

        /* ─── MODAL ─── */
        #publish-modal { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); display:none; align-items:center; justify-content:center; }
        #publish-modal.active { display:flex; }
        .pub-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:32px; max-width:480px; width:90%; text-align:center; box-shadow:var(--shadow); }
        .pub-card input { width:100%; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); margin:16px 0; font-family:monospace; }
        .pub-btn { padding:12px 24px; border-radius:8px; font-weight:600; margin:6px; transition:var(--transition); }
        .pub-btn.primary { background:var(--green); color:#0b0b10; }
        .pub-btn.primary:hover { filter:brightness(1.1); }
        .pub-btn.secondary { background:transparent; border:1px solid var(--border); color:var(--text); }

        .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:var(--accent); color:#0b0b10; padding:12px 24px; border-radius:99px; font-weight:600; z-index:9999; animation:toastIn 0.3s, toastOut 0.3s 2s forwards; }
        @keyframes toastIn { from{opacity:0; transform:translateX(-50%) translateY(20px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0; transform:translateX(-50%) translateY(20px);} }
    </style>
</head>
<body>
<div id="gallery-page">
    <header class="gallery-header">
        <h1>InvitaFácil</h1>
        <p class="subtitle">Invitaciones Digitales Premium</p>
    </header>
    <div class="gallery-controls">
        <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="Buscar plantilla..." oninput="filterTemplates()"></div>
        <div id="filters-container" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>
    <div class="gallery-stats" id="gallery-stats"></div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <footer style="text-align:center;padding:24px;color:var(--text2);">© <span id="copy-year"></span> InvitaFácil</footer>
</div>

<div id="viewer-page">
    <div id="progress-bar"></div>
    <canvas id="particles-canvas"></canvas>
    <button class="nav-btn btn-back" onclick="goBack()">← Volver</button>
    <button class="nav-btn btn-publish" onclick="openPublishModal()">🚀 Publicar</button>
    <button class="nav-btn btn-edit" onclick="openEditor()">✎ Personalizar</button>
    <div id="splash" onclick="closeSplash()"></div>
    <div id="viewer-content"></div>
    <div id="music-player"><button id="music-toggle" onclick="toggleMusic()">🎵</button><div id="music-panel"><iframe id="music-iframe" width="100%" height="80" src=""></iframe></div></div>
</div>

<div id="lightbox" style="position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;" onclick="closeLightbox()">
    <img id="lb-img" style="max-width:90vw;max-height:90vh;border-radius:8px;">
</div>

<div id="publish-modal">
    <div class="pub-card">
        <h2 style="font-family:'Montserrat',sans-serif;">✨ Tu invitación está lista</h2>
        <p style="color:var(--text2);margin:8px 0;">Comparte el enlace mágico</p>
        <input type="text" id="pub-link-input" readonly>
        <div>
            <button class="pub-btn primary" onclick="copyPublishLink()">📋 Copiar enlace</button>
            <button class="pub-btn secondary" onclick="previewPublished()">👁 Vista previa</button>
            <button class="pub-btn secondary" onclick="downloadHTML()">💾 Descargar HTML</button>
        </div>
        <button onclick="closePublishModal()" style="margin-top:12px;background:transparent;color:var(--text2);">Cerrar</button>
    </div>
</div>

<div id="editor-backdrop" onclick="closeEditor()"></div>
<div id="editor-panel">
    <div class="ed-header">
        <h3 style="font-family:'Montserrat',sans-serif;">Personalizar</h3>
        <span id="ed-template-badge" style="background:var(--accent);color:#0b0b10;padding:4px 12px;border-radius:99px;font-size:0.7rem;"></span>
        <button onclick="closeEditor()" style="background:transparent;color:var(--text);font-size:1.5rem;">&times;</button>
    </div>
    <div class="ed-tabs">
        <button class="ed-tab active" data-tab="textos" onclick="switchEdTab(this)">Textos</button>
        <button class="ed-tab" data-tab="diseno" onclick="switchEdTab(this)">Diseño</button>
        <button class="ed-tab" data-tab="fotos" onclick="switchEdTab(this)">Fotos</button>
        <button class="ed-tab" data-tab="musica" onclick="switchEdTab(this)">Música</button>
        <button class="ed-tab" data-tab="avanzado" onclick="switchEdTab(this)">Avanzado</button>
    </div>
    <div class="ed-content">
        <div class="tab-panel active" id="panel-textos">
            <div class="ed-field"><label>Etiqueta</label><input id="ed-splashLabel" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Nombre 1</label><input id="ed-p1" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Conector</label><input id="ed-conn" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Nombre 2</label><input id="ed-p2" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Fecha</label><input id="ed-dateDisp" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Fecha evento</label><input type="datetime-local" id="ed-eventDate" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Lugar</label><input id="ed-venue" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Dirección</label><input id="ed-address" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Ciudad</label><input id="ed-city" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Hora</label><input id="ed-eventTime" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Vestimenta</label><input id="ed-dresscode" oninput="edUpdate()"></div>
            <div class="ed-field"><label>RSVP deadline</label><input id="ed-rsvpDeadline" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Frase final</label><input id="ed-footerVerse" oninput="edUpdate()"></div>
        </div>
        <div class="tab-panel" id="panel-diseno">
            <div class="ed-field"><label>Color fondo</label><div class="color-row"><input type="color" id="ed-bgC" oninput="edUpdate()"><input id="ed-bgCT" oninput="document.getElementById('ed-bgC').value=this.value;edUpdate()" style="flex:1;"></div></div>
            <div class="ed-field"><label>Color botones</label><div class="color-row"><input type="color" id="ed-btnC" oninput="edUpdate()"><input id="ed-btnCT" oninput="document.getElementById('ed-btnC').value=this.value;edUpdate()" style="flex:1;"></div></div>
            <div class="ed-field"><label>Color secundario</label><div class="color-row"><input type="color" id="ed-secC" oninput="edUpdate()"><input id="ed-secCT" oninput="document.getElementById('ed-secC').value=this.value;edUpdate()" style="flex:1;"></div></div>
            <div class="ed-field"><label>Tipografía</label><select id="ed-fontDisplay" onchange="edUpdate()"><option value="'Great Vibes', cursive">Great Vibes</option><option value="'Playfair Display', serif">Playfair</option><option value="'Dancing Script', cursive">Dancing Script</option><option value="'Pacifico', cursive">Pacifico</option></select></div>
        </div>
        <div class="tab-panel" id="panel-fotos">
            <div class="ed-field"><label>Foto principal</label><img id="ed-hero-img" style="width:100%;border-radius:8px;margin-bottom:8px;"><button onclick="document.getElementById('ed-hero-f').click()" style="width:100%;padding:10px;background:var(--surface2);border:1px dashed var(--border);color:var(--text2);border-radius:8px;">Cambiar</button><input type="file" id="ed-hero-f" accept="image/*" hidden onchange="edHeroUpload(event)"></div>
            <div class="ed-field"><label>Galería</label><div id="ed-gal-thumbs" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div><button onclick="document.getElementById('ed-gal-f').click()" style="width:100%;padding:10px;background:var(--surface2);border:1px dashed var(--border);color:var(--text2);border-radius:8px;">+ Agregar</button><input type="file" id="ed-gal-f" accept="image/*" multiple hidden onchange="edGalUpload(event)"></div>
        </div>
        <div class="tab-panel" id="panel-musica">
            <div class="ed-field"><label>YouTube URL</label><input id="ed-music" placeholder="https://youtube.com/watch?v=..." oninput="edMusicUpdate()"></div>
        </div>
        <div class="tab-panel" id="panel-avanzado">
            <div class="ed-field"><label>Partículas</label><select id="ed-particles" onchange="edUpdate()"><option value="petals">Pétalos</option><option value="stars">Estrellas</option><option value="confetti">Confeti</option><option value="bubbles">Burbujas</option><option value="none">Ninguna</option></select></div>
            <div class="ed-field"><label>Título historia</label><input id="ed-storyTitle" oninput="edUpdate()"></div>
            <div class="ed-field"><label>Texto historia</label><textarea id="ed-storyText1" rows="3" oninput="edUpdate()"></textarea></div>
        </div>
    </div>
</div>

    let currentFilter = "todos", currentTemplate = null, ST = {}, lbIdx = 0, cdInterval, animFrame;

    function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2300); }
    function initGallery(){
        document.getElementById("copy-year").textContent=new Date().getFullYear();
        const fc=document.getElementById("filters-container");
        CATEGORIES.forEach(c=>{ const b=document.createElement('button'); b.className='filter-btn'+(c.id==='todos'?' active':''); b.textContent=c.label; b.onclick=()=>{currentFilter=c.id; document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filterTemplates();}; fc.appendChild(b); });
        filterTemplates();
    }
    function filterTemplates(){
        const q=document.getElementById("search-input").value.toLowerCase();
        const filtered=TEMPLATES.filter(t=>(currentFilter==='todos'||t.category===currentFilter)&&(!q||t.name.toLowerCase().includes(q)||t.tags.some(tg=>tg.includes(q))));
        document.getElementById("gallery-stats").textContent=filtered.length+' plantillas';
        const grid=document.getElementById("gallery-grid");
        grid.innerHTML=filtered.map(t=>{
            const d=t.defaults, names=d.person1+(d.connector?` ${d.connector} `:' & ')+d.person2;
            return `<div class="gallery-card" onclick="openTemplate('${t.id}')">
                <div class="preview"><div class="preview-bg" style="background-image:url(${t.heroImage})"></div><div class="preview-content"><span style="font-family:${t.fonts.display};font-size:2rem;">${names}</span><span style="font-size:0.7rem;">${d.eventDateDisplay}</span></div><span class="badge">${t.category}</span></div>
                <div class="info"><h3>${t.name}</h3><p>${t.description||''}</p><div class="tags">${t.tags.map(tg=>`<span class="tag">${tg}</span>`).join('')}</div><button class="view-btn">Ver invitación</button></div>
            </div>`;
        }).join('');
    }

    function openTemplate(id){
        currentTemplate=TEMPLATES.find(t=>t.id===id); if(!currentTemplate) return;
        const t=currentTemplate; ST={...t.defaults, templateId:t.id, bgColor:t.palette.bg, buttonColor:t.palette.primary, secondaryColor:t.palette.secondary, textColor:t.palette.text, textLightColor:t.palette.textLight, cardColor:t.palette.card, heroImage:t.heroImage, galleryImages:[...t.gallery], musicYoutubeId:t.defaults.musicYoutubeId, particles:t.particles, fontDisplay:t.fonts.display, fontHeading:t.fonts.heading};
        document.getElementById("gallery-page").style.display='none';
        document.getElementById("viewer-page").style.display='block';
        window.scrollTo(0,0);
        render(); startParticles(); showSplash();
    }
    function goBack(){ document.getElementById("viewer-page").style.display='none'; document.getElementById("gallery-page").style.display='block'; if(animFrame) cancelAnimationFrame(animFrame); if(cdInterval) clearInterval(cdInterval); }

    function render(){
        const p={bg:ST.bgColor,primary:ST.buttonColor,secondary:ST.secondaryColor,text:ST.textColor,textLight:ST.textLightColor,card:ST.cardColor};
        const title=ST.person1+(ST.connector?` ${ST.connector} `:' & ')+ST.person2;
        let html=`<section class="inv-hero hero-${currentTemplate.heroStyle}"><div class="hero-bg" style="background-image:url(${ST.heroImage})"></div><div class="hero-content"><div style="letter-spacing:4px;font-size:0.7rem;">${ST.splashLabel}</div><h1 style="font-family:${ST.fontDisplay};font-size:clamp(3rem,10vw,7rem);">${ST.person1} <span style="color:${p.secondary}">${ST.connector||''}</span> ${ST.person2}</h1><div style="font-size:1.1rem;margin:16px 0;">${ST.eventDateDisplay}</div><div>${ST.venue} · ${ST.city}</div><div style="margin-top:24px;"><a href="#rsvp" style="background:${p.primary};color:${p.bg};padding:14px 28px;border-radius:6px;">Confirmar</a></div></div></section>`;
        html+=`<section style="background:${p.card};padding:40px;text-align:center;"><h2 style="font-family:${ST.fontHeading};">Cuenta regresiva</h2><div style="display:flex;gap:16px;justify-content:center;">${['Días','Horas','Min','Seg'].map((l,i)=>`<div style="background:${p.bg};padding:20px;border-radius:8px;"><span id="cdv${i}" style="font-size:2.5rem;color:${p.primary};">00</span><div>${l}</div></div>`).join('')}</div></section>`;
        html+=`<section id="rsvp" style="background:${p.card};padding:40px;"><div style="max-width:400px;margin:0 auto;"><h3>RSVP</h3><form onsubmit="submitRSVP(event)"><input required placeholder="Tu nombre" style="width:100%;padding:12px;margin:10px 0;background:transparent;border:1px solid ${p.primary};color:${p.text};"><button type="submit" style="background:${p.primary};color:${p.bg};padding:12px 24px;border:none;border-radius:6px;">Enviar</button></form><div id="rsvp-thx" style="display:none;">🎉 ¡Gracias por confirmar!</div></div></section>`;
        html+=`<footer style="background:${p.text};color:${p.bg};padding:40px;text-align:center;"><p style="font-family:${ST.fontDisplay};font-size:2rem;">${title}</p><p>${ST.eventDateDisplay}</p><p>${ST.footerVerse}</p></footer>`;
        document.getElementById("viewer-content").innerHTML=html;
        if(ST.musicYoutubeId){ document.getElementById("music-player").style.display='block'; document.getElementById("music-iframe").src=`https://www.youtube.com/embed/${ST.musicYoutubeId}`; }
        startCountdown();
    }
    function showSplash(){ const s=document.getElementById("splash"); s.style.background=ST.bgColor; s.innerHTML=`<div style="text-align:center;color:${ST.textColor};"><div>${ST.splashLabel}</div><div style="font-family:${ST.fontDisplay};font-size:4rem;">${ST.person1} ${ST.connector||'&'} ${ST.person2}</div><div>${ST.eventDateDisplay}</div></div>`; s.classList.remove('splash-hidden'); setTimeout(()=>s.classList.add('splash-hidden'),3000); }
    function closeSplash(){ document.getElementById("splash").classList.add('splash-hidden'); }
    function startCountdown(){ if(cdInterval) clearInterval(cdInterval); updateCD(); cdInterval=setInterval(updateCD,1000); }
    function updateCD(){ const diff=Math.max(0,new Date(ST.eventDate).getTime()-Date.now()); const v=[Math.floor(diff/86400000),Math.floor((diff%86400000)/3600000),Math.floor((diff%3600000)/60000),Math.floor((diff%60000)/1000)]; v.forEach((n,i)=>{ const el=document.getElementById('cdv'+i); if(el) el.textContent=String(n).padStart(2,'0'); }); }
    function startParticles(){ /* simplificado */ }
    function submitRSVP(e){ e.preventDefault(); document.getElementById("rsvp-form").style.display='none'; document.getElementById("rsvp-thx").style.display='block'; }

    function buildPublishPayload(){ return {...ST}; }
    function generatePublishLink(){ const json=JSON.stringify(buildPublishPayload()); const compressed=LZString.compressToEncodedURIComponent(json); const url=new URL(window.location.href); url.hash='invite='+compressed; return url.toString(); }
    function openPublishModal(){ document.getElementById("pub-link-input").value=generatePublishLink(); document.getElementById("publish-modal").classList.add('active'); }
    function closePublishModal(){ document.getElementById("publish-modal").classList.remove('active'); }
    function copyPublishLink(){ const i=document.getElementById("pub-link-input"); i.select(); navigator.clipboard.writeText(i.value); showToast('Enlace copiado'); }
    function previewPublished(){ window.open(document.getElementById("pub-link-input").value,'_blank'); }
    function downloadHTML(){ const link=generatePublishLink(); const htmlContent=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Invitación</title><script>window.location.href='${link}';<\/script></head><body>Cargando...</body></html>`; const blob=new Blob([htmlContent],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='invitacion.html'; a.click(); }

    function loadFromHash(){ const hash=window.location.hash; if(!hash.startsWith('#invite=')) return false; try{ const json=LZString.decompressFromEncodedURIComponent(hash.replace('#invite=','')); const payload=JSON.parse(json); if(!payload.templateId) return false; const template=TEMPLATES.find(t=>t.id===payload.templateId); if(!template) return false; currentTemplate=template; ST=payload; document.getElementById("gallery-page").style.display='none'; document.getElementById("viewer-page").style.display='block'; render(); startParticles(); showSplash(); return true; }catch(e){ return false; } }

    // Editor functions
    function openEditor(){ document.getElementById("editor-backdrop").classList.add('active'); document.getElementById("editor-panel").classList.add('active'); edFill(); }
    function closeEditor(){ document.getElementById("editor-backdrop").classList.remove('active'); document.getElementById("editor-panel").classList.remove('active'); }
    function switchEdTab(btn){ document.querySelectorAll('.ed-tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); document.getElementById('panel-'+btn.dataset.tab).classList.add('active'); }
    function edFill(){
        document.getElementById("ed-splashLabel").value=ST.splashLabel||''; document.getElementById("ed-p1").value=ST.person1; document.getElementById("ed-p2").value=ST.person2; document.getElementById("ed-conn").value=ST.connector; document.getElementById("ed-dateDisp").value=ST.eventDateDisplay; document.getElementById("ed-eventDate").value=ST.eventDate?ST.eventDate.slice(0,16):''; document.getElementById("ed-venue").value=ST.venue||''; document.getElementById("ed-address").value=ST.address||''; document.getElementById("ed-city").value=ST.city||''; document.getElementById("ed-eventTime").value=ST.eventTime||''; document.getElementById("ed-dresscode").value=ST.dresscode||''; document.getElementById("ed-rsvpDeadline").value=ST.rsvpDeadline||''; document.getElementById("ed-footerVerse").value=ST.footerVerse||'';
        document.getElementById("ed-bgC").value=ST.bgColor; document.getElementById("ed-bgCT").value=ST.bgColor; document.getElementById("ed-btnC").value=ST.buttonColor; document.getElementById("ed-btnCT").value=ST.buttonColor; document.getElementById("ed-secC").value=ST.secondaryColor; document.getElementById("ed-secCT").value=ST.secondaryColor;
        document.getElementById("ed-fontDisplay").value=ST.fontDisplay; document.getElementById("ed-particles").value=ST.particles; document.getElementById("ed-storyTitle").value=ST.storyTitle||''; document.getElementById("ed-storyText1").value=ST.storyText1||'';
        document.getElementById("ed-hero-img").src=ST.heroImage; document.getElementById("ed-music").value=ST.musicYoutubeId?`https://youtube.com/watch?v=${ST.musicYoutubeId}`:'';
        buildGalThumbs();
    }
    function edUpdate(){
        ST.splashLabel=document.getElementById("ed-splashLabel").value; ST.person1=document.getElementById("ed-p1").value; ST.person2=document.getElementById("ed-p2").value; ST.connector=document.getElementById("ed-conn").value; ST.eventDateDisplay=document.getElementById("ed-dateDisp").value; const dv=document.getElementById("ed-eventDate").value; if(dv) ST.eventDate=dv+":00"; ST.venue=document.getElementById("ed-venue").value; ST.address=document.getElementById("ed-address").value; ST.city=document.getElementById("ed-city").value; ST.eventTime=document.getElementById("ed-eventTime").value; ST.dresscode=document.getElementById("ed-dresscode").value; ST.rsvpDeadline=document.getElementById("ed-rsvpDeadline").value; ST.footerVerse=document.getElementById("ed-footerVerse").value;
        ST.bgColor=document.getElementById("ed-bgC").value; ST.buttonColor=document.getElementById("ed-btnC").value; ST.secondaryColor=document.getElementById("ed-secC").value; ST.fontDisplay=document.getElementById("ed-fontDisplay").value; ST.particles=document.getElementById("ed-particles").value; ST.storyTitle=document.getElementById("ed-storyTitle").value; ST.storyText1=document.getElementById("ed-storyText1").value;
        document.getElementById("ed-bgCT").value=ST.bgColor; document.getElementById("ed-btnCT").value=ST.buttonColor; document.getElementById("ed-secCT").value=ST.secondaryColor;
        render();
    }
    function buildGalThumbs(){ const c=document.getElementById("ed-gal-thumbs"); c.innerHTML=ST.galleryImages.map((img,i)=>`<div style="position:relative;"><img src="${img.src}" style="width:100%;height:60px;object-fit:cover;border-radius:4px;"><button onclick="rmGal(${i})" style="position:absolute;top:2px;right:2px;background:red;color:#fff;border:none;border-radius:50%;width:20px;height:20px;">×</button></div>`).join(''); }
    function rmGal(i){ ST.galleryImages.splice(i,1); buildGalThumbs(); render(); }
    function edHeroUpload(e){ const f=e.target.files[0]; if(!f) return; ST.heroImage=URL.createObjectURL(f); document.getElementById("ed-hero-img").src=ST.heroImage; render(); }
    function edGalUpload(e){ Array.from(e.target.files).forEach(f=>ST.galleryImages.push({src:URL.createObjectURL(f),cap:f.name})); buildGalThumbs(); render(); }
    function edMusicUpdate(){ ST.musicYoutubeId=document.getElementById("ed-music").value.split('v=')[1]?.split('&')[0]||''; render(); }

    if(!loadFromHash()){ initGallery(); }
</script>
</body>
</html>

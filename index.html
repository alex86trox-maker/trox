<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InkAR · Tatuajes en Realidad Aumentada (AR.js)</title>
    <!-- Font Awesome para iconos minimalistas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Info flotante */
        .info-top {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .info-top i {
            color: #b967ff;
            margin-right: 8px;
        }
        /* Panel de controles inferior */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px 16px 30px;
            box-sizing: border-box;
            z-index: 20;
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(185, 103, 255, 0.3);
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            color: white;
        }
        .gallery {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 4px;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: #b967ff #2a2a40;
            -webkit-overflow-scrolling: touch;
            justify-content: center;
            flex-wrap: wrap; /* En móviles se envuelve */
        }
        .gallery button {
            background: #2b2b44;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #151525;
            transition: all 0.15s;
            border: 2px solid transparent;
            min-width: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery button.active {
            border-color: #b967ff;
            background: #4a3970;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2a1b44;
        }
        .gallery button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #151525;
        }
        .tools {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        .color-picker {
            display: flex;
            gap: 12px;
        }
        .color-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .color-btn.black { background: #222; }
        .color-btn.red { background: #d32f2f; }
        .color-btn.blue { background: #1976d2; }
        .color-btn.gray { background: #757575; }
        .color-btn.active {
            border-color: white;
            transform: scale(1.15);
            box-shadow: 0 0 15px currentColor;
        }
        .size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #5a5a8a;
        }
        .size-control i {
            color: #b967ff;
            font-size: 1.3rem;
        }
        input[type=range] {
            width: 160px;
            height: 6px;
            background: #2b2b44;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #b967ff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 8px black;
        }
        .footer-note {
            font-size: 0.8rem;
            color: #a0a0cc;
            text-align: center;
            width: 100%;
            margin-top: 5px;
        }
        .footer-note a {
            color: #b967ff;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .gallery button { font-size: 1.8rem; padding: 10px 16px; min-width: 60px; }
            .tools { gap: 12px; }
            .color-btn { width: 40px; height: 40px; }
            input[type=range] { width: 120px; }
        }
    </style>
</head>
<body>
    <!-- Mensaje informativo superior -->
    <div class="info-top">
        <i class="fas fa-camera"></i> Apunta al marcador <strong>HIRO</strong> (imprímelo o muéstralo en otra pantalla)
    </div>

    <!-- Panel de controles inferior -->
    <div class="controls-panel">
        <div class="gallery" id="gallery">
            <button class="tattoo-btn active" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
            <button class="tattoo-btn" data-icon="fa-moon"><i class="fas fa-moon"></i></button>
            <button class="tattoo-btn" data-icon="fa-feather"><i class="fas fa-feather"></i></button>
            <button class="tattoo-btn" data-icon="fa-infinity"><i class="fas fa-infinity"></i></button>
            <button class="tattoo-btn" data-icon="fa-tree"><i class="fas fa-tree"></i></button>
            <button class="tattoo-btn" data-icon="fa-anchor"><i class="fas fa-anchor"></i></button>
            <button class="tattoo-btn" data-icon="fa-star"><i class="fas fa-star"></i></button>
            <button class="tattoo-btn" data-icon="fa-dreamcatcher"><i class="fas fa-dreamcatcher"></i></button>
        </div>
        <div class="tools">
            <div class="color-picker">
                <button class="color-btn black active" data-color="black" title="Negro"></button>
                <button class="color-btn red" data-color="red" title="Rojo"></button>
                <button class="color-btn blue" data-color="blue" title="Azul"></button>
                <button class="color-btn gray" data-color="gray" title="Gris"></button>
            </div>
            <div class="size-control">
                <i class="fas fa-expand-alt"></i>
                <input type="range" id="sizeSlider" min="0.3" max="2.0" step="0.05" value="1.0">
            </div>
        </div>
        <div class="footer-note">
            <i class="fas fa-magic"></i> El tatuaje aparece sobre el marcador. Cambia diseño, color y tamaño en tiempo real.
        </div>
    </div>

    <!-- Cargamos A-Frame y AR.js desde CDNs -->
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.4.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        (function() {
            // ---- Estado de la aplicación ----
            let currentIcon = 'fa-heart';
            let currentColor = '#222222'; // negro por defecto
            let currentScale = 1.0;

            // ---- Referencias a elementos del DOM ----
            const gallery = document.getElementById('gallery');
            const colorButtons = document.querySelectorAll('.color-btn');
            const sizeSlider = document.getElementById('sizeSlider');

            // ---- Función para actualizar la textura del sprite ----
            function updateTattooMaterial() {
                if (!window.tattooSprite) return;

                // Crear canvas para dibujar el icono con FontAwesome
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');

                // Limpiar (fondo transparente)
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Mapear nombre de icono a carácter Unicode de Font Awesome 6 (Free)
                const iconMap = {
                    'fa-heart': '\uf004',
                    'fa-moon': '\uf186',
                    'fa-feather': '\uf52d',
                    'fa-infinity': '\uf534',
                    'fa-tree': '\uf1bb',
                    'fa-anchor': '\uf13d',
                    'fa-star': '\uf005',
                    'fa-dreamcatcher': '\uf77b'
                };
                const character = iconMap[currentIcon] || '\uf004';

                // Configurar estilo del texto
                ctx.font = '200px "Font Awesome 6 Free"';
                ctx.fillStyle = currentColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Dibujar el icono centrado
                ctx.fillText(character, 128, 128);

                // Crear textura y asignarla al sprite
                const texture = new THREE.CanvasTexture(canvas);
                window.tattooSprite.material.map = texture;
                window.tattooSprite.material.color.setHex(0xffffff); // el color ya lo da el canvas
                window.tattooSprite.material.needsUpdate = true;
            }

            // ---- Componente de A-Frame para manejar el sprite sobre el marcador ----
            AFRAME.registerComponent('tattoo-handler', {
                init: function() {
                    const marker = this.el;

                    marker.addEventListener('markerFound', () => {
                        console.log('Marcador HIRO detectado');

                        // Crear canvas inicial
                        const canvas = document.createElement('canvas');
                        canvas.width = 256;
                        canvas.height = 256;
                        const ctx = canvas.getContext('2d');
                        ctx.font = '200px "Font Awesome 6 Free"';
                        ctx.fillStyle = currentColor;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('\uf004', 128, 128); // corazón por defecto

                        const texture = new THREE.CanvasTexture(canvas);
                        const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
                        const sprite = new THREE.Sprite(material);
                        sprite.scale.set(currentScale, currentScale, 1);

                        // Guardar referencia global
                        window.tattooSprite = sprite;

                        // Añadir al marcador
                        this.el.object3D.add(sprite);
                    });

                    marker.addEventListener('markerLost', () => {
                        console.log('Marcador perdido');
                        if (window.tattooSprite) {
                            this.el.object3D.remove(window.tattooSprite);
                            window.tattooSprite = null;
                        }
                    });
                }
            });

            // ---- Inyectar la escena A-Frame ----
            // Nota: La escena debe crearse después de registrar el componente.
            const sceneHTML = `
                <a-scene embedded
                         arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'
                         vr-mode-ui='enabled: false'>
                    <!-- Marcador HIRO (patrón alojado en CDN) -->
                    <a-marker type='pattern'
                              url='https://raw.githack.com/AR-js-org/AR.js/master/data/data/hiro.patt'
                              emitevents='true'
                              tattoo-handler>
                    </a-marker>
                    <!-- Cámara fija (necesaria) -->
                    <a-entity camera></a-entity>
                </a-scene>
            `;
            document.body.insertAdjacentHTML('afterbegin', sceneHTML);

            // ---- Eventos de la interfaz ----
            // Cambio de icono
            gallery.addEventListener('click', (e) => {
                const btn = e.target.closest('.tattoo-btn');
                if (!btn) return;

                const iconElem = btn.querySelector('i');
                let iconClass = '';
                for (let cls of iconElem.classList) {
                    if (cls.startsWith('fa-')) {
                        iconClass = cls;
                        break;
                    }
                }
                if (!iconClass) return;

                currentIcon = iconClass;

                // Actualizar botones activos
                document.querySelectorAll('.tattoo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                updateTattooMaterial();
            });

            // Cambio de color
            colorButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const colorKey = btn.dataset.color;
                    let colorHex = '#222222';
                    if (colorKey === 'red') colorHex = '#d32f2f';
                    else if (colorKey === 'blue') colorHex = '#1976d2';
                    else if (colorKey === 'gray') colorHex = '#757575';
                    currentColor = colorHex;

                    // Actualizar botones activos
                    colorButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    updateTattooMaterial();
                });
            });

            // Cambio de tamaño
            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                if (window.tattooSprite) {
                    window.tattooSprite.scale.set(currentScale, currentScale, 1);
                }
            });

        })();
    </script>
</body>
</html>

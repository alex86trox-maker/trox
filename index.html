<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InkAR · Tatuajes Virtuales</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; color: white; touch-action: pan-y pinch-zoom; }
        a-scene { width: 100vw; height: 100vh; display: block; }
        .marker-status {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            padding: 6px 12px; border-radius: 30px; font-size: 0.8rem;
            border: 1px solid #b967ff; color: #b967ff; z-index: 70;
            display: flex; align-items: center; gap: 6px;
        }
        .marker-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #f44336; }
        .marker-status .dot.active { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .marker-thumb {
            position: absolute; bottom: 90px; left: 12px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            border-radius: 12px; padding: 4px; border: 1px solid #b967ff; z-index: 70;
        }
        .marker-thumb img { width: 40px; border-radius: 6px; display: block; }
        .controls-panel {
            position: absolute; bottom: 12px; left: 10px; right: 10px;
            background: rgba(20,20,30,0.8); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 10px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100;
            display: flex; flex-direction: column; gap: 8px;
        }
        .row { display: flex; align-items: center; gap: 8px; }
        .icon-gallery {
            display: flex; gap: 4px; overflow-x: auto; padding: 4px 0;
            scrollbar-width: thin; scrollbar-color: #b967ff #2b2b44;
            -webkit-overflow-scrolling: touch; flex: 1;
        }
        .icon-gallery button {
            background: #2b2b44; border: none; border-radius: 40px;
            padding: 6px 10px; color: white; font-size: 1.2rem;
            cursor: pointer; box-shadow: 0 2px 0 #151525; transition: all 0.1s;
            flex: 0 0 auto; border: 1px solid transparent; min-width: 40px;
        }
        .icon-gallery button.active { border-color: #b967ff; background: #4a3970; }
        .color-picker {
            display: flex; gap: 4px; background: rgba(0,0,0,0.3);
            padding: 4px 6px; border-radius: 30px;
        }
        .color-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; transition: 0.1s;
        }
        .color-btn.black { background: #222; }
        .color-btn.red { background: #d32f2f; }
        .color-btn.blue { background: #1976d2; }
        .color-btn.gray { background: #757575; }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        .size-control {
            display: flex; align-items: center; gap: 4px;
            background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 30px;
            color: white;
        }
        .size-control i { font-size: 0.9rem; color: #b967ff; }
        #sizeSlider { width: 70px; height: 4px; background: #2b2b44; border-radius: 10px; -webkit-appearance: none; }
        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #b967ff; border-radius: 50%; cursor: pointer; border: 2px solid white;
        }
        @media (max-width: 360px) {
            .icon-gallery button { font-size: 1rem; padding: 5px 8px; min-width: 36px; }
            .color-btn { width: 24px; height: 24px; }
            #sizeSlider { width: 50px; }
            .marker-thumb { bottom: 80px; }
        }
    </style>
</head>
<body>
    <div class="marker-status" id="markerStatus">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Buscando...</span>
    </div>
    <div class="marker-thumb">
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" alt="Marcador">
    </div>
    <div class="controls-panel">
        <div class="row">
            <div class="icon-gallery" id="iconGallery">
                <button class="tattoo-btn active" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
                <button class="tattoo-btn" data-icon="fa-moon"><i class="fas fa-moon"></i></button>
                <button class="tattoo-btn" data-icon="fa-feather"><i class="fas fa-feather"></i></button>
                <button class="tattoo-btn" data-icon="fa-infinity"><i class="fas fa-infinity"></i></button>
                <button class="tattoo-btn" data-icon="fa-tree"><i class="fas fa-tree"></i></button>
                <button class="tattoo-btn" data-icon="fa-anchor"><i class="fas fa-anchor"></i></button>
                <button class="tattoo-btn" data-icon="fa-star"><i class="fas fa-star"></i></button>
                <button class="tattoo-btn" data-icon="fa-dreamcatcher"><i class="fas fa-dreamcatcher"></i></button>
            </div>
        </div>
        <div class="row" style="justify-content: space-between;">
            <div class="color-picker">
                <button class="color-btn black active" data-color="black" title="Negro"></button>
                <button class="color-btn red" data-color="red" title="Rojo"></button>
                <button class="color-btn blue" data-color="blue" title="Azul"></button>
                <button class="color-btn gray" data-color="gray" title="Gris"></button>
            </div>
            <div class="size-control">
                <i class="fas fa-expand-alt"></i>
                <input type="range" id="sizeSlider" min="0.5" max="3.0" step="0.1" value="2.0">
            </div>
        </div>
    </div>

    <a-scene
        id="scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- TATUAJE: más grande, más pegado al marcador, siempre visible -->
            <a-image id="tatuaje"
                     src=""
                     position="0 0.1 0"   <!-- Menos elevado, más realista -->
                     rotation="-90 0 0"
                     width="1.2"
                     height="1.2"
                     material="transparent: true; depthTest: false; side: double;"
                     scale="2.0 2.0 2.0">  <!-- Escala inicial mayor -->
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            const scene = document.getElementById('scene');
            const tatuaje = document.getElementById('tatuaje');
            const iconGallery = document.getElementById('iconGallery');
            const colorButtons = document.querySelectorAll('.color-btn');
            const sizeSlider = document.getElementById('sizeSlider');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            let currentIcon = 'fa-heart';
            let currentColor = '#222222';
            let currentScale = 2.0; // Coincide con el valor inicial del slider

            const iconMap = {
                'fa-heart': '\u{f004}',
                'fa-moon': '\u{f186}',
                'fa-feather': '\u{f52d}',
                'fa-infinity': '\u{f534}',
                'fa-tree': '\u{f1bb}',
                'fa-anchor': '\u{f13d}',
                'fa-star': '\u{f005}',
                'fa-dreamcatcher': '\u{f77b}'
            };

            function generateTattooDataURL() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '400px "Font Awesome 6 Free"';
                ctx.fillStyle = currentColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(iconMap[currentIcon] || '\u{f004}', 256, 256);
                return canvas.toDataURL();
            }

            function updateTattoo() {
                const dataURL = generateTattooDataURL();
                tatuaje.setAttribute('src', dataURL);
                console.log('Tatuaje actualizado');
            }

            iconGallery.addEventListener('click', (e) => {
                const btn = e.target.closest('.tattoo-btn');
                if (!btn) return;
                const iconElem = btn.querySelector('i');
                let iconClass = '';
                for (let cls of iconElem.classList) {
                    if (cls.startsWith('fa-')) {
                        iconClass = cls;
                        break;
                    }
                }
                if (!iconClass) return;
                currentIcon = iconClass;
                document.querySelectorAll('.tattoo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateTattoo();
            });

            colorButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const colorKey = btn.dataset.color;
                    let colorHex = '#222222';
                    if (colorKey === 'red') colorHex = '#d32f2f';
                    else if (colorKey === 'blue') colorHex = '#1976d2';
                    else if (colorKey === 'gray') colorHex = '#757575';
                    currentColor = colorHex;
                    colorButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateTattoo();
                });
            });

            sizeSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            });

            const targetEntity = document.querySelector('[mindar-image-target]');
            if (targetEntity) {
                targetEntity.addEventListener('targetFound', () => {
                    statusDot.classList.add('active');
                    statusText.innerText = 'Detectado';
                    updateTattoo();
                });
                targetEntity.addEventListener('targetLost', () => {
                    statusDot.classList.remove('active');
                    statusText.innerText = 'Buscando...';
                });
            }

            scene.addEventListener('loaded', () => {
                updateTattoo();
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            });

            setTimeout(() => {
                updateTattoo();
                tatuaje.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            }, 1500);
        })();
    </script>
</body>
</html>

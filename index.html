<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvitaFácil — Invitaciones Digitales Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&family=Space+Grotesk:wght@400;700&family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=Josefin+Sans:wght@400;600&family=Dancing+Script:wght@400;600&family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#f8f5f0;color:#1a1410;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#b8960c88;border-radius:99px}
.hidden{display:none!important}
img{max-width:100%;display:block}
button,a{font-family:'DM Sans',sans-serif;text-decoration:none}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1410;color:#fff;padding:12px 28px;border-radius:99px;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;opacity:0;transition:all .35s;z-index:99999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#progress-bar{position:fixed;top:0;left:0;height:2px;z-index:1000;transition:width .075s;pointer-events:none}
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}

.floating-actions{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:12px;pointer-events:none}
.float-btn{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 22px;border-radius:14px;font-size:.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;backdrop-filter:blur(20px);transition:all .3s;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.float-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.btn-publish{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:1px solid rgba(255,255,255,.1)}
.btn-edit{background:rgba(20,20,30,.8);color:#fff;border:1px solid rgba(255,255,255,.15)}
.btn-edit:hover{background:rgba(30,30,45,.85)}
.btn-back-fixed{position:fixed;top:20px;left:20px;z-index:2000;display:flex;align-items:center;gap:8px;padding:12px 22px;border-radius:14px;font-size:.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;backdrop-filter:blur(20px);background:rgba(20,20,30,.8);color:#fff;border:1px solid rgba(255,255,255,.15);cursor:pointer;transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.btn-back-fixed:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3)}

#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;text-align:center;padding:32px;transition:opacity .9s cubic-bezier(.4,0,.2,1),transform .9s cubic-bezier(.4,0,.2,1)}
#splash.hide{opacity:0;transform:translateY(-100%);pointer-events:none}
.splash-line{position:absolute;left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%)}
.splash-pulse{font-size:.6rem;letter-spacing:6px;text-transform:uppercase;animation:pulse 2s infinite;margin-top:40px}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

#lightbox{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center}
#lightbox img{max-width:85vw;max-height:78vh;object-fit:contain}
#lb-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:#fff;cursor:pointer;font-size:1.6rem;line-height:1}
#lb-prev,#lb-next{position:absolute;top:50%;transform:translateY(-50%);background:transparent;border:1px solid rgba(255,255,255,.25);color:#fff;cursor:pointer;padding:12px 14px;font-size:1.1rem;line-height:1}
#lb-prev{left:16px}#lb-next{right:16px}
#lb-cap{margin-top:16px;font-size:.6rem;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.45)}

#publish-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
.pub-card{background:#1a1a2e;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:32px;max-width:460px;width:90%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);position:relative}
.pub-card h3{color:#fff;font-family:'Montserrat',sans-serif;font-size:1.2rem;margin-bottom:4px}
.pub-subtitle{color:rgba(255,255,255,.4);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.pub-card input{width:100%;padding:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;margin:16px 0;font-family:monospace;font-size:.8rem}
.pub-btn{padding:12px 24px;border-radius:8px;font-weight:600;margin:6px;transition:.3s;font-size:.7rem;letter-spacing:1px;text-transform:uppercase}
.pub-btn.primary{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none}
.pub-btn.primary:hover{opacity:.9;transform:translateY(-1px)}
.pub-btn.secondary{background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff}
.pub-btn.secondary:hover{background:rgba(255,255,255,.08)}
.pub-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s}
.pub-close:hover{background:rgba(255,255,255,.2)}

#editor-backdrop{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
#editor-panel{position:fixed;top:0;right:0;bottom:0;z-index:3001;width:100%;max-width:420px;background:#1a1a2e;border-left:1px solid rgba(255,255,255,.1);flex-direction:column;overflow:hidden;font-family:'DM Sans',sans-serif;display:flex}
.ed-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;color:#fff}
.ed-tabs{display:flex;overflow-x:auto}
.ed-tab{flex:1;padding:12px;font-size:.6rem;text-transform:uppercase;background:transparent;color:rgba(255,255,255,.5);border-bottom:2px solid transparent}
.ed-tab.active{color:#c9a96e;border-bottom-color:#c9a96e}
.ed-content{flex:1;overflow-y:auto;padding:20px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.ed-field{margin-bottom:18px}
.ed-field label{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);display:block;margin-bottom:6px}
.ed-field input,.ed-field select,.ed-field textarea{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#fff;font-size:.8rem}

.map-container{margin-top:24px;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.map-container iframe{width:100%;height:300px;border:0;display:block}

.g-header{position:relative;overflow:hidden;text-align:center;padding:80px 24px 72px;background:linear-gradient(135deg,#0a0804 0%,#1a1208 50%,#0a0804 100%)}
.g-eyebrow{font-size:.6rem;letter-spacing:12px;text-transform:uppercase;color:#c9a84c;font-family:'Tenor Sans',sans-serif;margin-bottom:16px;opacity:0;animation:fadeInUp .6s .1s ease forwards}
.g-title{font-family:'Great Vibes',cursive;font-size:clamp(4rem,10vw,7rem);color:#c9a84c;line-height:1;opacity:0;animation:fadeInUp .8s .2s ease forwards}
.g-sub{margin-top:16px;font-size:.85rem;color:rgba(255,255,255,.35);opacity:0;animation:fadeIn .7s .5s ease forwards}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.g-controls{max-width:1040px;margin:0 auto;padding:32px 20px 8px}
.search-wrap{position:relative;max-width:420px;margin-bottom:20px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:.4;font-size:.9rem}
.search-wrap input{width:100%;padding:12px 16px 12px 44px;border-radius:99px;border:1px solid #e8e0d8;background:#fff;font-size:.85rem;outline:none;font-family:'DM Sans',sans-serif;color:#1a1410}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:8px 16px;border-radius:99px;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border:1px solid #e0d8d0;background:#fff;color:#888;transition:all .25s}
.filter-btn.active{background:#120e06;color:#c9a84c;border-color:#c9a84c;font-weight:700}
.g-count{font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:#aaa;padding:0 4px}
.template-grid{max-width:1040px;margin:0 auto;padding:16px 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:24px}
.t-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #f0e8e0;cursor:pointer;transition:transform .35s,box-shadow .35s}
.t-card:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(0,0,0,.13)}
.t-thumb{position:relative;height:210px;overflow:hidden}
.t-thumb-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55);transition:transform .7s}
.t-card:hover .t-thumb-bg{transform:scale(1.07)}
.t-cat-badge{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:99px;font-size:.52rem;letter-spacing:4px;text-transform:uppercase;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);color:#fff}
.t-preview{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6);padding:16px}
.t-preview-name{line-height:1.1}
.t-preview-date{margin-top:8px;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.75)}
.t-style-badge{margin-top:10px;padding:3px 12px;border-radius:99px;font-size:.5rem;letter-spacing:3px;text-transform:uppercase;color:#fff}
.t-body{padding:20px}
.t-name{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:6px}
.t-desc{font-size:.75rem;color:#888;line-height:1.65;margin-bottom:14px}
.t-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.t-tag{padding:3px 8px;border-radius:99px;font-size:.52rem;background:#f5f0eb;border:1px solid #e8e0d8;color:#888}
.t-btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;color:#fff;transition:opacity .2s}
.t-btn:hover{opacity:.85}

#viewer-page{position:relative;z-index:1}
.hero-section{position:relative;min-height:100vh;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.hero-overlay{position:absolute;inset:0}
.hero-content{position:relative;z-index:10;padding:40px 32px 80px}
.hero-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.hero-left{display:flex;flex-direction:column;justify-content:flex-end;min-height:100vh;padding:80px 40px 80px;max-width:700px}
.v-section{padding:80px 32px}
.v-eyebrow{font-size:.58rem;letter-spacing:8px;text-transform:uppercase;display:block;margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;max-width:820px;margin:0 auto 56px}
@media(min-width:640px){.info-grid{grid-template-columns:repeat(4,1fr)}}
.info-cell{padding:28px;text-align:center}
.info-num{font-family:'Playfair Display',serif;font-style:italic;font-size:2rem;opacity:.18;margin-bottom:8px}
.info-label{font-size:.52rem;letter-spacing:5px;text-transform:uppercase;margin-bottom:8px}
.info-val{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;line-height:1.55;white-space:pre-line}
.countdown-row{display:flex;justify-content:center;flex-wrap:wrap}
.cd-unit{text-align:center;padding:0 28px;position:relative}
.cd-unit:not(:last-child)::after{content:'';position:absolute;right:0;top:15%;bottom:15%;width:1px;background:currentColor;opacity:.12}
.cd-num{line-height:1}
.cd-lbl{font-size:.52rem;letter-spacing:6px;text-transform:uppercase;margin-top:10px;display:block}
.program-list{max-width:520px;margin:0 auto}
.p-item{display:grid;grid-template-columns:80px 1px 1fr;gap:0 16px;padding-bottom:20px}
.p-time{text-align:right;font-family:'Playfair Display',serif;font-style:italic;font-size:1rem}
.p-line{position:relative}
.p-dot{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;border:1px solid currentColor;background:#fff}
.p-body{padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.p-event{font-size:.58rem;letter-spacing:4px;text-transform:uppercase;font-weight:700;display:block;margin-bottom:4px}
.p-desc{font-size:.8rem;font-style:italic;font-family:'Playfair Display',serif;opacity:.7}
.mosaic{display:grid;gap:8px;grid-template-columns:repeat(4,1fr);grid-auto-rows:140px;max-width:920px;margin:0 auto}
.m-item{overflow:hidden;position:relative;cursor:zoom-in;border-radius:8px}
.m-item:nth-child(1){grid-column:span 2;grid-row:span 2}
.m-item:nth-child(4){grid-row:span 2}
.m-item:nth-child(5){grid-column:span 2}
.m-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.m-item:hover img{transform:scale(1.06)}
.m-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
.m-item:hover .m-overlay{opacity:1}
.m-cap{font-size:.55rem;letter-spacing:5px;text-transform:uppercase;color:#fff}
@media(max-width:640px){.mosaic{grid-template-columns:repeat(2,1fr);grid-auto-rows:100px}.m-item:nth-child(1){grid-column:span 2;grid-row:span 1}.m-item:nth-child(4){grid-row:span 1}.m-item:nth-child(5){grid-column:span 2}}
.rsvp-deadline{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;opacity:.7;margin-bottom:24px}
.f-label{display:block;font-size:.58rem;letter-spacing:4px;text-transform:uppercase;opacity:.6;margin-bottom:8px}
.f-input{width:100%;border:none;border-bottom:1px solid currentColor;padding:8px 0;font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;background:transparent;outline:none;color:inherit}
.f-group{margin-bottom:24px}
.attend-row{display:flex;gap:12px;margin-bottom:24px}
.a-btn{flex:1;border:1px solid currentColor;padding:12px;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;background:transparent;cursor:pointer;color:inherit;transition:all .2s;font-family:'DM Sans',sans-serif}
.a-btn.sel,.a-btn:hover{color:#fff}
.s-btn{width:100%;padding:16px;border:none;font-size:.58rem;letter-spacing:5px;text-transform:uppercase;font-weight:700;cursor:pointer;color:#fff;transition:opacity .2s;font-family:'DM Sans',sans-serif;margin-top:8px}
.s-btn:hover{opacity:.85}
.rsvp-thanks{text-align:center;padding:56px 0}
.rsvp-thanks p{font-family:'Playfair Display',serif;font-style:italic;font-size:1.2rem;margin-top:12px}
.split-hero{display:grid;min-height:100vh}
@media(min-width:768px){.split-hero{grid-template-columns:1fr 1fr}}
.split-img{position:relative;min-height:50vh}
.split-img-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.split-text{display:flex;flex-direction:column;justify-content:center;padding:60px 40px}
.adult-hero{display:grid;min-height:100vh}
@media(min-width:768px){.adult-hero{grid-template-columns:60px 3fr 1fr}}
.adult-accent{display:none}
@media(min-width:768px){.adult-accent{display:flex;flex-direction:column;align-items:center;justify-content:center}}
.adult-accent-text{font-size:.6rem;letter-spacing:16px;text-transform:uppercase;color:#fff;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg)}
.adult-img{position:relative;min-height:40vh}
.adult-img-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.adult-grad{position:absolute;inset:0}
.ach-top-bar{display:flex;justify-content:space-between;padding:24px 40px;border-bottom:1px solid rgba(255,255,255,.1);position:relative;z-index:10}
.neon-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,204,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,.06) 1px,transparent 1px);background-size:40px 40px}
.bloom-hero-grid{position:absolute;inset:0;display:grid}
@media(min-width:768px){.bloom-hero-grid{grid-template-columns:1fr 1fr}}
.two-col{display:grid;gap:48px;align-items:center}
@media(min-width:768px){.two-col{grid-template-columns:1fr 1fr}}
.three-col{display:grid;gap:0}
@media(min-width:768px){.three-col{grid-template-columns:2fr 1px 1fr}}
.stats-bar{display:flex;flex-wrap:wrap}
.stat-cell{flex:1;padding:20px 24px;text-align:center;min-width:120px}
.timeline-list{space-y:20px}
.tl-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.tl-year{font-size:1.8rem;line-height:1}
.tl-dash{flex:1;height:1px;opacity:.25;background:currentColor}
.tl-event{font-size:.8rem}
@media(max-width:640px){.hide-sm{display:none!important}.hero-left{padding:40px 24px 60px}.v-section{padding:56px 20px}.split-text{padding:40px 24px}.ach-top-bar{padding:16px 20px}}
</style>
</head>
<body>

<div id="toast"></div>
<div id="progress-bar"></div>
<canvas id="particle-canvas" class="hidden"></canvas>

<div id="splash" class="hidden">
  <div class="splash-line" id="splash-line"></div>
  <div style="position:relative;z-index:10;text-align:center;padding:32px">
    <p id="splash-eyebrow" style="font-family:'Tenor Sans',sans-serif;font-size:.6rem;letter-spacing:12px;text-transform:uppercase;margin-bottom:24px"></p>
    <h1 id="splash-title" style="line-height:.9"></h1>
    <p id="splash-date" style="font-family:'Tenor Sans',sans-serif;font-size:.6rem;letter-spacing:8px;text-transform:uppercase;margin-top:24px"></p>
    <p class="splash-pulse" id="splash-hint" style="color:rgba(255,255,255,.4)">Toca para entrar</p>
  </div>
</div>

<div id="lightbox" class="hidden">
  <button id="lb-close">✕</button>
  <button id="lb-prev">&#8249;</button>
  <img id="lb-img" src="" alt="">
  <p id="lb-cap"></p>
  <button id="lb-next">&#8250;</button>
</div>

<div id="publish-modal" class="hidden">
  <div class="pub-card">
    <button class="pub-close" onclick="document.getElementById('publish-modal').classList.add('hidden')">×</button>
    <h3>✨ Tu invitación está lista</h3>
    <p class="pub-subtitle">Comparte el enlace mágico</p>
    <input type="text" id="pub-link-input" readonly>
    <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:8px;">
      <button class="pub-btn primary" onclick="copyPublishLink()">📋 Copiar enlace</button>
      <button class="pub-btn secondary" onclick="previewPublished()">👁 Vista previa</button>
      <button class="pub-btn secondary" onclick="downloadHTML()">💾 Descargar HTML</button>
    </div>
  </div>
</div>

<div id="editor-backdrop" class="hidden" onclick="closeEditor()"></div>
<div id="editor-panel" class="hidden">
  <div class="ed-header"><h3>Personalizar</h3><span id="ed-template-badge" style="background:#c9a96e;color:#0b0b10;padding:2px 10px;border-radius:99px;font-size:.7rem;"></span><button onclick="closeEditor()" style="background:transparent;color:#fff;font-size:1.5rem;">&times;</button></div>
  <div class="ed-tabs">
    <button class="ed-tab active" data-tab="textos">Textos</button>
    <button class="ed-tab" data-tab="diseno">Diseño</button>
    <button class="ed-tab" data-tab="fotos">Fotos</button>
    <button class="ed-tab" data-tab="whatsapp">WhatsApp</button>
  </div>
  <div class="ed-content">
    <div class="tab-panel active" id="panel-textos">
      <div class="ed-field"><label>Etiqueta</label><input id="ed-splashLabel" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Nombre 1</label><input id="ed-p1" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Conector</label><input id="ed-conn" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Nombre 2</label><input id="ed-p2" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Fecha</label><input id="ed-dateDisp" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Fecha evento</label><input type="datetime-local" id="ed-eventDate" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Lugar</label><input id="ed-venue" oninput="edUpdate()"></div>
      <div class="ed-field"><label>Dirección</label><input id="ed-address" oninput="edUpdate()"></div>

  const canvas=document.getElementById('particle-canvas');canvas.classList.remove('hidden');
  const ctx=canvas.getContext('2d');let W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;
  const COLORS={petals:["#f8c8c0","#f4a0a0","#f9d4d4","#e8b0b8","#fce4ec"],stars:[primaryColor,"#ffffff","#ffffcc","#fff9c4"],confetti:["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff99cc","#c77dff"],bubbles:["#81d4fa","#b3e5fc","#e1f5fe","#ffffff","#80deea"],sparks:[primaryColor,"#ffffff","#ffff00","#ff8800"]};
  const count=type==="confetti"?80:type==="petals"?40:60;const pal=COLORS[type]||COLORS.stars;
  const motes=Array.from({length:count},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*(type==="confetti"?1.5:.4),vy:type==="petals"||type==="confetti"?Math.random()*.8+.2:-(Math.random()*.5+.1),r:Math.random()*(type==="confetti"?5:3)+1,alpha:Math.random()*.5+.1,color:pal[Math.floor(Math.random()*pal.length)],angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.05,w:Math.random()*8+4,h:Math.random()*4+2}));
  const onResize=()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight};window.addEventListener('resize',onResize);
  function draw(){ctx.clearRect(0,0,W,H);for(const m of motes){m.x+=m.vx;m.y+=m.vy;m.angle+=m.va;if(m.y>H+20)m.y=-20;if(m.y<-20)m.y=H+20;if(m.x<-20)m.x=W+20;if(m.x>W+20)m.x=-20;ctx.save();ctx.globalAlpha=m.alpha;ctx.fillStyle=m.color;ctx.strokeStyle=m.color;
    if(type==="confetti"){ctx.translate(m.x,m.y);ctx.rotate(m.angle);ctx.fillRect(-m.w/2,-m.h/2,m.w,m.h);}
    else if(type==="petals"){ctx.translate(m.x,m.y);ctx.rotate(m.angle);ctx.beginPath();ctx.ellipse(0,0,m.r*2,m.r,0,0,Math.PI*2);ctx.fill();}
    else if(type==="bubbles"){ctx.beginPath();ctx.arc(m.x,m.y,m.r*2,0,Math.PI*2);ctx.lineWidth=.5;ctx.stroke();}
    else{ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();}
    ctx.restore();}app.particleRaf=requestAnimationFrame(draw);}
  draw();app._particleResize=onResize;
}

function stopParticles(){if(app.particleRaf){cancelAnimationFrame(app.particleRaf);app.particleRaf=null;}if(app._particleResize){window.removeEventListener('resize',app._particleResize);}const c=document.getElementById('particle-canvas');c.classList.add('hidden');c.getContext('2d').clearRect(0,0,c.width,c.height);}

function getCountdown(dateStr){const diff=Math.max(0,new Date(dateStr).getTime()-Date.now());return[{val:Math.floor(diff/86400000),lbl:"Días"},{val:Math.floor((diff%86400000)/3600000),lbl:"Horas"},{val:Math.floor((diff%3600000)/60000),lbl:"Min"},{val:Math.floor((diff%60000)/1000),lbl:"Seg"}];}

function countdownHTML(st,numStyle,lblStyle){return `<div class="countdown-row">${getCountdown(st.eventDate).map((u,i)=>`<div class="cd-unit"><div class="cd-num" style="${numStyle}">${String(u.val).padStart(2,'0')}</div><span class="cd-lbl" style="${lblStyle}">${u.lbl}</span></div>`).join('')}</div>`;}

function programHTML(st,timeColor,lineColor,textColor,labelColor){return `<div class="program-list">${st.programItems.map(item=>`<div class="p-item"><div class="p-time" style="color:${timeColor}">${item.time}</div><div class="p-line" style="background:${lineColor}"><div class="p-dot" style="border-color:${timeColor}"></div></div><div class="p-body" style="border-color:${lineColor}"><span class="p-event" style="color:${labelColor}">${item.event}</span><p class="p-desc" style="color:${textColor}">${item.desc}</p></div></div>`).join('')}</div>`;}

function mosaicHTML(st){return `<div class="mosaic">${st.galleryImages.slice(0,6).map((img,i)=>`<div class="m-item" data-lb="${i}"><img src="${img.src}" alt="${img.cap}" loading="lazy"><div class="m-overlay"><span class="m-cap">${img.cap}</span></div></div>`).join('')}</div>`;}

function mapHTML(st){const query=encodeURIComponent(`${st.address}, ${st.city}`);return `<div class="map-container" style="max-width:800px;margin:0 auto;"><iframe src="https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${query}" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div><p style="text-align:center;margin-top:12px;"><a href="https://www.google.com/maps?q=${query}" target="_blank" style="font-size:.6rem;letter-spacing:2px;text-transform:uppercase;">Abrir en Google Maps →</a></p>`;}

function rsvpHTML(p){if(app.rsvpDone)return `<div class="rsvp-thanks"><div style="font-size:3rem">🌸</div><p>¡Gracias por confirmar!</p></div>`;return `<form id="rsvp-form"><p class="rsvp-deadline">Confírmanos antes del <strong>${app.st.rsvpDeadline}</strong></p><div class="f-group"><label class="f-label">Nombre completo</label><input class="f-input" type="text" required placeholder="Tu nombre..." style="border-color:${p.primary};color:${p.text}"></div><div class="f-group"><label class="f-label">¿Asistirás?</label><div class="attend-row"><button type="button" class="a-btn" data-attend="si" style="border-color:${p.primary};color:${p.text}">Asisto ✓</button><button type="button" class="a-btn" data-attend="no" style="border-color:${p.primary};color:${p.text}">No podré</button></div></div><button type="submit" class="s-btn" style="background:${p.primary}">Enviar Confirmación por WhatsApp</button></form>`;}

function infoGridHTML(st,p){const cells=[{num:"I",lbl:"Fecha",val:st.eventDateDisplay},{num:"II",lbl:"Hora",val:st.eventTime},{num:"III",lbl:"Lugar",val:`${st.venue}\n${st.address}\n${st.city}`},{num:"IV",lbl:"Dress Code",val:st.dresscode}];return `<div class="info-grid" style="background:${p.primary}22">${cells.map(c=>`<div class="info-cell" style="background:${p.card}"><div class="info-num" style="color:${p.primary}">${c.num}</div><div class="info-label" style="color:${p.primary}">${c.lbl}</div><div class="info-val" style="color:${p.textLight}">${c.val}</div></div>`).join('')}</div>`;}

function timelineHTML(st,yearColor,textColor){return st.timeline.map(m=>`<div class="tl-item"><span class="tl-year" style="color:${yearColor};font-family:${app.st.fontDisplay}">${m.year}</span><div class="tl-dash"></div><span class="tl-event" style="color:${textColor}">${m.event}</span></div>`).join('');}

const LAYOUT_RENDERERS={elegant:layoutElegant,noir:layoutNoir,princess:layoutPrincess,royal:layoutRoyal,festive:layoutFestive,celestial:layoutCelestial,achievement:layoutAchievement,neon:layoutNeon,bloom:layoutBloom,adult:layoutAdult};

function renderGallery(){const{filter,query}=app;const filtered=TEMPLATES.filter(t=>(filter==='todos'||t.category===filter)&&(!query||t.name.toLowerCase().includes(query.toLowerCase())||t.tags.some(g=>g.includes(query.toLowerCase()))));document.getElementById('filters').innerHTML=CATEGORIES.map(c=>`<button class="filter-btn${filter===c.id?' active':''}" data-filter="${c.id}">${c.label}</button>`).join('');document.getElementById('g-count').textContent=`${filtered.length} plantillas`;document.getElementById('template-grid').innerHTML=filtered.map(t=>{const d=t.defaults;const title=`${d.person1}${d.connector?` ${d.connector} `:" "}${d.person2}`;return`<div class="t-card" data-id="${t.id}"><div class="t-thumb"><div class="t-thumb-bg" style="background-image:url(${t.heroImage})"></div><span class="t-cat-badge">${t.category}</span><div class="t-preview"><div class="t-preview-name" style="font-family:${t.fonts.display};font-size:clamp(1.2rem,3vw,1.8rem)">${title}</div><div class="t-preview-date">${d.eventDateDisplay}</div><div class="t-style-badge" style="background:${t.palette.primary}">${LAYOUT_LABELS[t.layoutStyle]}</div></div></div><div class="t-body"><div class="t-name" style="color:${t.palette.primary}">${t.name}</div><div class="t-desc">${t.description}</div><div class="t-tags">${t.tags.map(g=>`<span class="t-tag">${g}</span>`).join('')}</div><button class="t-btn" style="background:${t.palette.primary}">Ver invitación</button></div></div>`;}).join('');}

function renderViewer(template){app.template=template;app.rsvpDone=false;app.splashClosed=false;app.lbIdx=null;const d=template.defaults;app.st={...d,templateId:template.id,bgColor:template.palette.bg,buttonColor:template.palette.primary,secondaryColor:template.palette.secondary,textColor:template.palette.text,textLightColor:template.palette.textLight,cardColor:template.palette.card,heroImage:template.heroImage,galleryImages:[...template.gallery],particles:template.particles,fontDisplay:template.fonts.display,fontHeading:template.fonts.heading};document.getElementById('gallery-page').classList.add('hidden');const vp=document.getElementById('viewer-page');vp.classList.remove('hidden');vp.style.background=app.st.bgColor;vp.style.color=app.st.textColor;const renderer=LAYOUT_RENDERERS[template.layoutStyle]||layoutElegant;vp.innerHTML=renderer(app.st);document.getElementById('progress-bar').style.background=`linear-gradient(to right,${app.st.buttonColor},${app.st.secondaryColor})`;window.scrollTo(0,0);app.view='viewer';showSplash();startParticles(app.st.particles,app.st.buttonColor);if(app.cdInterval)clearInterval(app.cdInterval);app.cdInterval=setInterval(()=>{const el=document.getElementById('cd-el');if(el){const units=getCountdown(app.st.eventDate);el.querySelectorAll('.cd-num').forEach((n,i)=>{n.textContent=String(units[i].val).padStart(2,'0');});}},1000);}

function showSplash(){const s=document.getElementById('splash');const tmpl=app.template;s.style.background=tmpl.palette.bg;document.getElementById('splash-line').style.background=`linear-gradient(to bottom,transparent,${tmpl.palette.primary}44,transparent)`;document.getElementById('splash-eyebrow').style.color=tmpl.palette.primary;document.getElementById('splash-eyebrow').textContent=app.st.splashLabel;const title=`${app.st.person1}${app.st.connector?` ${app.st.connector} `:" "}${app.st.person2}`;const th=document.getElementById('splash-title');th.style.fontFamily=tmpl.fonts.display;th.style.fontSize='clamp(3rem,12vw,7rem)';th.style.color=tmpl.palette.text;th.textContent=title;document.getElementById('splash-date').style.color=tmpl.palette.textLight;document.getElementById('splash-date').textContent=app.st.eventDateDisplay;s.classList.remove('hidden','hide');setTimeout(()=>closeSplash(),4000);}

function closeSplash(){if(app.splashClosed)return;app.splashClosed=true;document.getElementById('splash').classList.add('hide');}

function backToGallery(){app.view='gallery';stopParticles();if(app.cdInterval){clearInterval(app.cdInterval);app.cdInterval=null;}document.getElementById('viewer-page').classList.add('hidden');document.getElementById('splash').classList.add('hidden');document.getElementById('lightbox').classList.add('hidden');document.getElementById('progress-bar').style.width='0';document.getElementById('gallery-page').classList.remove('hidden');window.scrollTo(0,0);}

function openLightbox(idx){app.lbIdx=idx;const imgs=app.st.galleryImages;const lb=document.getElementById('lightbox');lb.classList.remove('hidden');document.getElementById('lb-img').src=imgs[idx]?.src||'';document.getElementById('lb-cap').textContent=imgs[idx]?.cap||'';}
function lbNav(dir){const len=app.st.galleryImages.length;app.lbIdx=((app.lbIdx||0)+dir+len)%len;openLightbox(app.lbIdx);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

window.addEventListener('scroll',()=>{if(app.view==='viewer'){const pct=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;document.getElementById('progress-bar').style.width=`${Math.min(pct,100)}%`;}});

document.addEventListener('click',e=>{
  const card=e.target.closest('.t-card');if(card){const id=card.dataset.id;const tmpl=TEMPLATES.find(t=>t.id===id);if(tmpl)renderViewer(tmpl);return;}
  const fb=e.target.closest('.filter-btn');if(fb){app.filter=fb.dataset.filter;renderGallery();return;}
  const mi=e.target.closest('.m-item');if(mi){openLightbox(parseInt(mi.dataset.lb)||0);return;}
  const ab=e.target.closest('.a-btn');if(ab){app.attendChoice=ab.dataset.attend;document.querySelectorAll('.a-btn').forEach(b=>{b.classList.remove('sel');b.style.background='transparent';b.style.color=app.st.textColor;});ab.classList.add('sel');ab.style.background=app.st.buttonColor;ab.style.color='#fff';return;}
  if(e.target.id==='lb-close'||e.target.id==='lightbox'){document.getElementById('lightbox').classList.add('hidden');return;}
  if(e.target.id==='lb-prev'||e.target.closest('#lb-prev')){lbNav(-1);return;}
  if(e.target.id==='lb-next'||e.target.closest('#lb-next')){lbNav(1);return;}
  if(e.target.closest('#splash')){closeSplash();return;}
});

document.addEventListener('submit',e=>{if(e.target.id==='rsvp-form'){e.preventDefault();const name=e.target.querySelector('input').value.trim();if(!name){showToast('Ingresa tu nombre');return;}const whatsappNumber=app.st.whatsappNumber||'';if(whatsappNumber){const text=`Hola, soy ${name}. Confirmo mi asistencia a: ${app.st.person1} ${app.st.connector||'&'} ${app.st.person2} - ${app.st.eventDateDisplay}`;window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`,'_blank');}app.rsvpDone=true;const wrap=document.getElementById('rsvp-wrap');if(wrap)wrap.innerHTML=`<div class="rsvp-thanks"><div style="font-size:3rem">🌸</div><p>¡Gracias por confirmar!</p></div>`;showToast('¡Confirmación enviada!');}});

document.getElementById('search-input').addEventListener('input',e=>{app.query=e.target.value;renderGallery();});
document.addEventListener('keydown',e=>{if(document.getElementById('lightbox').classList.contains('hidden'))return;if(e.key==='Escape')document.getElementById('lightbox').classList.add('hidden');if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});

// Publicar
function buildPublishPayload(){return{...app.st,galleryImages:app.st.galleryImages.map(g=>({src:g.src,cap:g.cap}))};}
function generatePublishLink(){const json=JSON.stringify(buildPublishPayload());const compressed=LZString.compressToEncodedURIComponent(json);const url=new URL(window.location.href);url.hash='invite='+compressed;return url.toString();}
function openPublishModal(){document.getElementById('pub-link-input').value=generatePublishLink();document.getElementById('publish-modal').classList.remove('hidden');}
function copyPublishLink(){const i=document.getElementById('pub-link-input');i.select();navigator.clipboard.writeText(i.value);showToast('¡Enlace copiado! 📋');}
function previewPublished(){window.open(document.getElementById('pub-link-input').value,'_blank');}
function downloadHTML(){const link=generatePublishLink();const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Invitación</title><script>window.location.href='${link}';<\/script></head><body>Cargando...</body></html>`;const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='invitacion.html';a.click();showToast('¡Descargado! 💾');}
function loadFromHash(){const hash=window.location.hash;if(!hash.startsWith('#invite='))return false;try{const json=LZString.decompressFromEncodedURIComponent(hash.replace('#invite=',''));const payload=JSON.parse(json);if(!payload.templateId)return false;const template=TEMPLATES.find(t=>t.id===payload.templateId);if(!template)return false;app.template=template;app.st=payload;document.getElementById('gallery-page').classList.add('hidden');document.getElementById('viewer-page').classList.remove('hidden');const vp=document.getElementById('viewer-page');vp.style.background=app.st.bgColor;vp.style.color=app.st.textColor;const renderer=LAYOUT_RENDERERS[template.layoutStyle]||layoutElegant;vp.innerHTML=renderer(app.st);document.getElementById('progress-bar').style.background=`linear-gradient(to right,${app.st.buttonColor},${app.st.secondaryColor})`;window.scrollTo(0,0);app.view='viewer';showSplash();startParticles(app.st.particles,app.st.buttonColor);if(app.cdInterval)clearInterval(app.cdInterval);app.cdInterval=setInterval(()=>{const el=document.getElementById('cd-el');if(el){const units=getCountdown(app.st.eventDate);el.querySelectorAll('.cd-num').forEach((n,i)=>{n.textContent=String(units[i].val).padStart(2,'0');});}},1000);return true;}catch(e){return false;}}

// Editor
function openEditor(){document.getElementById('editor-backdrop').classList.remove('hidden');document.getElementById('editor-panel').classList.remove('hidden');document.getElementById('ed-template-badge').textContent=app.template?.name||'';edFill();}
function closeEditor(){document.getElementById('editor-backdrop').classList.add('hidden');document.getElementById('editor-panel').classList.add('hidden');}
function edFill(){document.getElementById('ed-splashLabel').value=app.st.splashLabel||'';document.getElementById('ed-p1').value=app.st.person1;document.getElementById('ed-p2').value=app.st.person2;document.getElementById('ed-conn').value=app.st.connector;document.getElementById('ed-dateDisp').value=app.st.eventDateDisplay;document.getElementById('ed-eventDate').value=app.st.eventDate?app.st.eventDate.slice(0,16):'';document.getElementById('ed-venue').value=app.st.venue||'';document.getElementById('ed-address').value=app.st.address||'';document.getElementById('ed-city').value=app.st.city||'';document.getElementById('ed-eventTime').value=app.st.eventTime||'';document.getElementById('ed-dresscode').value=app.st.dresscode||'';document.getElementById('ed-footerVerse').value=app.st.footerVerse||'';document.getElementById('ed-bgC').value=app.st.bgColor;document.getElementById('ed-bgCT').value=app.st.bgColor;document.getElementById('ed-btnC').value=app.st.buttonColor;document.getElementById('ed-btnCT').value=app.st.buttonColor;document.getElementById('ed-secC').value=app.st.secondaryColor;document.getElementById('ed-secCT').value=app.st.secondaryColor;document.getElementById('ed-whatsapp').value=app.st.whatsappNumber||'';document.getElementById('ed-hero-img').src=app.st.heroImage;}
function edUpdate(){app.st.splashLabel=document.getElementById('ed-splashLabel').value;app.st.person1=document.getElementById('ed-p1').value;app.st.person2=document.getElementById('ed-p2').value;app.st.connector=document.getElementById('ed-conn').value;app.st.eventDateDisplay=document.getElementById('ed-dateDisp').value;const dv=document.getElementById('ed-eventDate').value;if(dv)app.st.eventDate=dv+":00";app.st.venue=document.getElementById('ed-venue').value;app.st.address=document.getElementById('ed-address').value;app.st.city=document.getElementById('ed-city').value;app.st.eventTime=document.getElementById('ed-eventTime').value;app.st.dresscode=document.getElementById('ed-dresscode').value;app.st.footerVerse=document.getElementById('ed-footerVerse').value;app.st.bgColor=document.getElementById('ed-bgC').value;app.st.buttonColor=document.getElementById('ed-btnC').value;app.st.secondaryColor=document.getElementById('ed-secC').value;app.st.whatsappNumber=document.getElementById('ed-whatsapp').value;document.getElementById('ed-bgCT').value=app.st.bgColor;document.getElementById('ed-btnCT').value=app.st.buttonColor;document.getElementById('ed-secCT').value=app.st.secondaryColor;const vp=document.getElementById('viewer-page');vp.style.background=app.st.bgColor;vp.style.color=app.st.textColor;const renderer=LAYOUT_RENDERERS[app.template.layoutStyle]||layoutElegant;vp.innerHTML=renderer(app.st);}
function edHeroUpload(e){const f=e.target.files[0];if(!f)return;app.st.heroImage=URL.createObjectURL(f);document.getElementById('ed-hero-img').src=app.st.heroImage;const renderer=LAYOUT_RENDERERS[app.template.layoutStyle]||layoutElegant;document.getElementById('viewer-page').innerHTML=renderer(app.st);}

// Attach publish/edit buttons
document.addEventListener('click',e=>{
  const pubBtn=e.target.closest('.btn-publish');if(pubBtn){openPublishModal();return;}
  const editBtn=e.target.closest('.btn-edit');if(editBtn){openEditor();return;}
  const backBtn=e.target.closest('.btn-back-fixed');if(backBtn){backToGallery();return;}
});
document.querySelector('.ed-tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.ed-tab');if(!tab)return;
  document.querySelectorAll('.ed-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
});

renderGallery();
if(loadFromHash()){} // Will auto-open viewer if hash present
</script>
</body>
</html>

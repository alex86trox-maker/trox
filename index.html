<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR con depuración</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #status {
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.8); color: white; 
            padding: 8px 16px; border-radius: 20px; 
            z-index: 100; font-size: 14px;
            border: 1px solid #00ff00;
        }
        #marker-guide {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 200;
            text-align: center;
        }
        #marker-guide img {
            width: 200px;
            border: 2px solid #333;
        }
        .debug-overlay {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            color: yellow; background: rgba(0,0,0,0.5); padding: 5px 10px;
            border-radius: 5px; z-index: 300;
        }
    </style>
</head>
<body>
    <div id="status">🔍 Iniciando cámara...</div>
    <div id="marker-guide">
        <p>🔽 Apunta a esta imagen (o a una impresión)</p>
        <img src="https://github.com/hiukim/mind-ar-js/raw/master/examples/image-tracking/assets/card-example/card.png" 
             alt="Marcador tarjeta">
    </div>
    <div class="debug-overlay" id="debug">Esperando detección...</div>

    <a-scene
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="width: 100%; height: 100%;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Objeto visible cuando se detecta el marcador -->
            <a-box position="0 0 0" material="color: red;" scale="0.5 0.5 0.5"></a-box>
            <a-text value="Detectado!" position="0 1 0" scale="0.5 0.5 0.5" color="white"></a-text>
        </a-entity>
    </a-scene>

    <script>
        // Esperar a que la escena esté lista y obtener referencia al componente mindar-image
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', function () {
            const mindar = scene.components['mindar-image'];
            if (mindar) {
                // Acceder al controller de MindAR
                const controller = mindar.system.controller;
                // Habilitar el modo de depuración (muestra puntos de características)
                controller.setDebug(true);
                document.getElementById('status').innerText = '✅ Cámara activa. Buscando marcador...';
            }
        });

        // Detectar eventos del marcador
        const target = document.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', () => {
            document.getElementById('status').innerText = '🎯 Marcador ENCONTRADO';
            document.getElementById('debug').innerText = '✅ Detectado!';
        });
        target.addEventListener('targetLost', () => {
            document.getElementById('status').innerText = '🔍 Buscando marcador...';
            document.getElementById('debug').innerText = '❌ Marcador perdido';
        });

        // Si hay errores en la consola, mostrarlos
        window.addEventListener('error', (e) => {
            document.getElementById('debug').innerText = 'Error: ' + e.message;
        });
    </script>
</body>
</html>
